<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="../common/styles.css">
<style>.sortable{cursor:pointer;user-select:none}.sortable:hover{color:var(--primary)}.sort-arrow{font-size:10px;margin-left:2px}.sort-arrow.asc::after{content:' ▲'}.sort-arrow.desc::after{content:' ▼'}</style>
</head><body class="content-page">
<div class="sub-navbar"><span class="sub-nav-title">📋 审核流模板管理</span><span class="breadcrumb"><a onclick="navTo('settings')">配置管理</a> > 审核流模板</span></div>
<div class="card"><div class="card-header"><h3>审核流模板列表 (18个)</h3><div class="actions"><button class="btn btn-sm btn-primary">＋ 新增模板</button></div></div><div class="card-body" style="padding:0;"><div class="table-wrap"><table><thead><tr><th class="sortable" onclick="sortTable(0)" data-col="0">模板名称 <span class="sort-arrow"></span></th><th class="sortable" onclick="sortTable(1)" data-col="1">适用模块 <span class="sort-arrow"></span></th><th class="sortable" onclick="sortTable(2)" data-col="2">审批节点数 <span class="sort-arrow"></span></th><th class="sortable" onclick="sortTable(3)" data-col="3">OA对接 <span class="sort-arrow"></span></th><th class="sortable" onclick="sortTable(4)" data-col="4">状态 <span class="sort-arrow"></span></th><th>操作</th></tr></thead><tbody id="tmplTableBody">
<tr><td>采购计划审批流</td><td><span class="tag tag-green">采购计划</span></td><td>3</td><td><span class="tag tag-green">已对接</span></td><td><span class="tag tag-green">启用</span></td><td><button class="btn btn-xs btn-outline">编辑</button></td></tr>
<tr><td>公开招标审批流</td><td><span class="tag tag-blue">公开招标</span></td><td>5</td><td><span class="tag tag-green">已对接</span></td><td><span class="tag tag-green">启用</span></td><td><button class="btn btn-xs btn-outline">编辑</button></td></tr>
<tr><td>直接采购审批流</td><td><span class="tag tag-orange">直接采购</span></td><td>2</td><td><span class="tag tag-green">已对接</span></td><td><span class="tag tag-green">启用</span></td><td><button class="btn btn-xs btn-outline">编辑</button></td></tr>
<tr><td>集采审批流</td><td><span class="tag tag-purple">集采管理</span></td><td>4</td><td><span class="tag tag-yellow">待对接</span></td><td><span class="tag tag-yellow">测试中</span></td><td><button class="btn btn-xs btn-outline">编辑</button></td></tr>
</tbody></table></div></div></div>
<button class="btn btn-outline mt-12" onclick="navTo('settings')">← 返回配置</button>
<script>
var sortCol=-1,sortAsc=true;
function sortTable(col){
    var t=document.getElementById('tmplTableBody'),rows=Array.from(t.querySelectorAll('tr'));
    sortCol===col?sortAsc=!sortAsc:(sortCol=col,sortAsc=true);
    document.querySelectorAll('.sort-arrow').forEach(function(a){a.className='sort-arrow'});
    var th=document.querySelector('th[data-col="'+col+'"] .sort-arrow');
    if(th)th.className='sort-arrow '+(sortAsc?'asc':'desc');
    rows.sort(function(a,b){
        var ca=(a.cells[col]||{}).textContent||'',cb=(b.cells[col]||{}).textContent||'';
        // 审批节点数(2) 数值排序
        if(col===2){var na=parseFloat(ca.replace(/[^0-9.]/g,''))||0,nb=parseFloat(cb.replace(/[^0-9.]/g,''))||0;return sortAsc?na-nb:nb-na;}
        return sortAsc?ca.localeCompare(cb,'zh-CN'):cb.localeCompare(ca,'zh-CN');
    });
    rows.forEach(function(r){t.appendChild(r)});
}
</script>
<script src="../common/scripts.js"></script></body></html>
