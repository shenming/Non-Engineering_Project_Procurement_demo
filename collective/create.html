<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="../common/styles.css"></head><body class="content-page">
<div class="sub-navbar"><span class="sub-nav-title">🤝 发起集采申请</span><span class="breadcrumb"><a onclick="navTo('collective')">集采管理</a> > 发起集采</span></div>
<div class="card"><div class="card-header"><h3>集采申请信息</h3></div><div class="card-body">
<div class="form-group"><label>集采品类 <span class="required">*</span></label><input class="form-control" value="物业服务框架"></div>
<div class="form-row"><div class="form-group"><label>业务模式 <span class="required">*</span></label><select class="form-control"><option>统采统签</option><option selected>统采分签</option></select></div><div class="form-group"><label>采购方式 <span class="required">*</span></label><select class="form-control"><option>公开招标</option><option selected>邀请招标</option><option>询比采购</option><option>谈判采购</option></select></div></div>
<div class="form-group"><label>关联计划（可多选） <span class="required">*</span></label><select class="form-control" multiple style="height:80px;"><option selected>PL-2026-0015 · 集团办公家具采购 · 集团总部</option><option selected>PL-2026-0022 · 物业服务招标 · 成员企业A</option><option>PL-2026-0031 · IT设备采购 · 成员企业B</option><option>PL-2026-0042 · 年度培训服务 · 成员企业A</option></select><span class="text-xs text-muted">按住 Ctrl 键多选</span></div>
<div class="form-group"><label>涉及成员企业清单 <span class="required">*</span></label><input class="form-control" value="集团总部、成员企业A、成员企业B"></div>
<div class="form-group"><label>集采方案附件</label><input class="form-control" type="file"></div>
<div class="alert alert-info text-sm"><span>💡</span><div><strong>统采分签说明：</strong> 集采完成后，各用户单位使用<strong>直接采购</strong>方式分签合同。</div></div></div>
<div class="card-header" style="border-top:1px solid var(--gray-200);border-bottom:none;background:#fff;"><span></span><div class="flex gap-8"><button class="btn btn-outline" onclick="navTo('collective')">取消</button><button class="btn btn-primary" onclick="showAlert('✅ 集采申请已提交审批。');navTo('collective')">提交审批</button></div></div></div>
<script src="../common/scripts.js"></script></body></html>
