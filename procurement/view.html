<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../common/styles.css">
    <style>
        .circle-steps { display: flex; align-items: center; gap: 0; padding: 16px 0; flex-wrap: nowrap; overflow-x: auto; }
        .circle-step { display: flex; align-items: center; gap: 6px; font-size: 12px; white-space: nowrap; cursor: default; }
        .circle-step .cnum { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-size: 13px; font-weight: 700; flex-shrink: 0; border: 2px solid var(--gray-300); color: var(--gray-400); background: #fff; }
        .circle-step.done { cursor: pointer; color: var(--primary); }
        .circle-step.done .cnum { border-color: var(--primary); background: #fff; color: var(--primary); }
        .circle-step.active { cursor: pointer; color: var(--primary); font-weight: 600; }
        .circle-step.active .cnum { border-color: var(--primary); background: var(--primary); color: #fff; }
        .circle-step.future { color: var(--gray-400); }
        .circle-step.future .cnum { border-color: var(--gray-300); background: #fff; color: var(--gray-400); }
        .step-connector { width: 32px; height: 2px; background: var(--gray-300); flex-shrink: 0; margin: 0 2px; }
        .step-connector.done { background: var(--primary); }
        .node-frame { width: 100%; min-height: 600px; border: 1px solid var(--gray-200); border-radius: var(--radius); background: #fff; }
        .tab-nav { display: flex; gap: 0; border-bottom: 2px solid var(--gray-200); margin-bottom: 0; }
        .tab-nav .tab-btn { padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--gray-500); background: none; border-top: none; border-left: none; border-right: none; }
        .tab-nav .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-body { display: none; }
        .tab-body.active { display: block; }
        .approval-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .approval-table th { text-align: left; padding: 8px 10px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); }
        .approval-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray-100); }
        .ver-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 36px; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; background: var(--primary-lighter); color: var(--primary-light); }
    </style>
</head>
<body class="content-page">

<!-- 顶部导航 -->
<div class="sub-navbar">
    <button class="btn btn-sm btn-outline" onclick="navTo('procurement')" style="margin-right:8px;">← 返回列表</button>
    <span class="sub-nav-title">🔍 招采详情</span>
    <span class="breadcrumb">
        <a onclick="navTo('procurement')">采购过程列表</a><span> › </span>
        <span id="breadProject">项目名称</span>
    </span>
</div>

<!-- 参照 plans/view.html 的 tab-card 布局 -->
<div class="tab-card">
    <div class="tab-header">
        <div class="tab-title">
            <h3 id="infoTitle">📄 项目名称</h3>
            <span class="tag tag-yellow" id="infoStatusTag" style="margin-left:8px;">进行中</span>
        </div>
        <div class="flex gap-8">
            <button class="btn btn-sm btn-danger" onclick="if(confirm('确认删除？'))showAlert('🗑️ 已删除')">🗑️ 删除</button>
            <button class="btn btn-sm btn-primary" onclick="submitNode()">📤 提交</button>
        </div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('tab-steps', this)">📌 招采进度</button>
        <button class="tab-btn" onclick="switchTab('tab-approval', this)">✅ 审批流预览</button>
    </div>

    <!-- TAB 招采进度 -->
    <div class="tab-body active" id="tab-steps" style="padding:12px 16px;">
        <div style="margin-bottom:8px;">
            <h3 id="procTitle" style="margin:0;font-size:14px;">📌 招标管理：步骤 1 / 7 (招采申请)</h3>
        </div>
        <div class="circle-steps" id="stepsContainer"></div>
    </div>

    <!-- TAB 审批流预览 -->
    <div class="tab-body" id="tab-approval">
        <table class="approval-table">
            <thead>
                <tr>
                    <th>节点描述</th>
                    <th>审批状态</th>
                    <th>审批日期</th>
                    <th>流程 ID</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>招采申请&招采公告</td><td><span class="tag tag-green">审批通过</span></td><td>2026-06-20</td><td>WF-2026-003-01</td></tr>
                <tr><td>开标信息</td><td><span class="tag tag-green">审批通过</span></td><td>2026-07-10</td><td>WF-2026-003-02</td></tr>
                <tr><td>上传评标结果&评标结果公示</td><td><span class="tag tag-yellow">审批中</span></td><td>—</td><td>WF-2026-003-03</td></tr>
                <tr><td>中标结果</td><td><span class="tag tag-gray">待提交</span></td><td>—</td><td>—</td></tr>
                <tr><td>中标结果公示</td><td><span class="tag tag-gray">待提交</span></td><td>—</td><td>—</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- iframe 节点详情（始终可见） -->
<iframe class="node-frame" id="nodeFrame" src="" style="margin-top:12px;"></iframe>

<!-- 底部全局操作栏 -->
<div class="flex-between" style="padding:12px 0;border-top:1px solid var(--gray-200);margin-top:12px;">
    <button class="btn btn-outline" onclick="prevStep()">← 上一步</button>
    <div class="flex gap-8">
        <button class="btn btn-primary" onclick="nextStep()">下一步 →</button>
        <button class="btn btn-outline" onclick="navTo('procurement')">取消</button>
    </div>
</div>

<script src="../common/scripts.js"></script>
<script>
var PUBLIC_BID_STEPS = [
    '招采申请', '招采公告', '开标信息', '上传评标结果',
    '评标结果公示', '中标结果', '中标结果公示'
];
var currentStep = 0;
var doneCount = 1;

(function init() {
    var ctx = null;
    try { ctx = JSON.parse(sessionStorage.getItem('procurementViewContext') || 'null'); } catch(e) {}
    if (ctx) {
        if (ctx.projectName) {
            document.getElementById('breadProject').textContent = ctx.projectName;
            document.getElementById('infoTitle').innerHTML = '📄 ' + ctx.projectName;
        }
        if (ctx.status === '进行中' || ctx.status === '审批中') { doneCount = 1; currentStep = 1; }
        else if (ctx.status === '已完成') { doneCount = PUBLIC_BID_STEPS.length; currentStep = PUBLIC_BID_STEPS.length; }
        sessionStorage.removeItem('procurementViewContext');
    }
    renderSteps();
    loadNode(currentStep);
})();

function renderSteps() {
    var container = document.getElementById('stepsContainer');
    document.getElementById('procTitle').innerHTML = '📌 招标管理：步骤 ' + (currentStep + 1) + ' / ' + PUBLIC_BID_STEPS.length + ' (' + PUBLIC_BID_STEPS[currentStep] + ')';
    var html = '';
    for (var i = 0; i < PUBLIC_BID_STEPS.length; i++) {
        if (i > 0) html += '<span class="step-connector ' + (i <= doneCount ? 'done' : '') + '"></span>';
        var cls = i < doneCount ? ' done' : (i === currentStep ? ' active' : ' future');
        html += '<span class="circle-step' + cls + '"' + (i <= doneCount ? ' onclick="onStepClick(' + i + ')"' : '') + '><span class="cnum">' + (i + 1) + '</span><span>' + PUBLIC_BID_STEPS[i] + '</span></span>';
    }
    container.innerHTML = html;
}

function onStepClick(index) {
    if (index <= doneCount) { currentStep = index; loadNode(index); renderSteps(); }
}

function loadNode(index) {
    var files = ['nodes/bid-apply.html','nodes/bid-announce.html','nodes/bid-opening.html','nodes/eval-result.html','nodes/eval-announce.html','nodes/award-result.html','nodes/award-announce.html'];
    document.getElementById('nodeFrame').src = files[index] || '';
}

function nextStep() {
    if (currentStep < PUBLIC_BID_STEPS.length - 1) { doneCount = currentStep + 1; currentStep = doneCount; renderSteps(); loadNode(currentStep); }
    else showAlert('🎉 已到达最后一步');
}

function prevStep() {
    if (currentStep > 0) { currentStep--; renderSteps(); loadNode(currentStep); }
    else showAlert('已经第一步');
}

function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-body').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById(tabId).classList.add('active');
}

function submitNode() { showAlert('📤 已提交当前节点审批'); }
</script>
</body>
</html>
