<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../common/styles.css">
    <style>
        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .info-grid .info-item { font-size: 13px; }
        .info-grid .info-label { color: var(--gray-500); font-size: 12px; }
        .info-grid .info-value { font-weight: 500; margin-top: 2px; }
        .steps-bar { display: flex; align-items: center; gap: 0; padding: 10px 0; flex-wrap: wrap; overflow-x: auto; }
        .steps-bar .step { display: flex; align-items: center; gap: 4px; font-size: 12px; padding: 4px 10px; border-radius: 16px; white-space: nowrap; }
        .steps-bar .step .snum { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 600; }
        .steps-bar .step.done { background: #ecfdf5; color: #065f46; cursor: pointer; }
        .steps-bar .step.done .snum { background: var(--success); color: #fff; }
        .steps-bar .step.active { background: var(--primary-lighter); color: var(--primary); font-weight: 600; }
        .steps-bar .step.active .snum { background: var(--primary); color: #fff; }
        .steps-bar .step.future { background: var(--gray-100); color: var(--gray-400); }
        .steps-bar .step.future .snum { background: var(--gray-200); color: var(--gray-500); }
        .step-arrow { margin: 0 2px; color: var(--gray-300); font-size: 12px; flex-shrink: 0; }
        .btn-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid var(--gray-200); margin-top: 12px; }
    </style>
</head>
<body class="content-page">

<!-- 顶部导航 -->
<div class="sub-navbar">
    <button class="btn btn-sm btn-outline" onclick="navTo('procurement')" style="margin-right:8px;">← 返回列表</button>
    <span class="sub-nav-title">🔍 招采详情</span>
    <span class="breadcrumb">
        <a onclick="navTo('procurement')">采购过程列表</a><span> › </span>
        <span id="breadProject">项目名称</span>
    </span>
</div>

<!-- 基本信息卡片 -->
<div class="card">
    <div class="card-header">
        <h3 id="infoTitle">📄 项目名称 <span class="tag tag-yellow" style="margin-left:8px;" id="infoStatusTag">进行中</span></h3>
        <div class="flex gap-8">
            <button class="btn btn-sm btn-outline" onclick="showAlert('正在导出...')">📥 导出</button>
            <button class="btn btn-sm btn-outline" onclick="showAlert('正在跳转OA审批...')">🔗 OA审批</button>
            <button class="btn btn-sm btn-outline" onclick="showAlert('✏️ 修改功能')">✏️ 修改</button>
        </div>
    </div>
    <div class="card-body">
        <div class="info-grid" id="infoGrid">
            <div class="info-item"><div class="info-label">申请编号</div><div class="info-value" id="infoId">—</div></div>
            <div class="info-item"><div class="info-label">采购方式</div><div class="info-value"><span class="tag tag-blue" id="infoMethod">公开招标</span></div></div>
            <div class="info-item"><div class="info-label">采购金额</div><div class="info-value"><span class="money" id="infoAmount">—</span></div></div>
            <div class="info-item"><div class="info-label">所属单位</div><div class="info-value" id="infoUnit">—</div></div>
            <div class="info-item"><div class="info-label">当前节点</div><div class="info-value fw-600" id="infoNode">—</div></div>
            <div class="info-item"><div class="info-label">关联计划</div><div class="info-value" id="infoPlan">—</div></div>
            <div class="info-item"><div class="info-label">经办人</div><div class="info-value" id="infoHandler">—</div></div>
            <div class="info-item"><div class="info-label">创建时间</div><div class="info-value">2026-06-19</div></div>
        </div>
    </div>
</div>

<!-- 流程步骤条 -->
<div class="card">
    <div class="card-header"><h3 id="procTitle">📌 流程进度</h3></div>
    <div class="card-body">
        <div class="steps-bar" id="stepsContainer"></div>
    </div>
</div>

<!-- 节点详情（用 showStepDetail 渲染） -->
<div id="stepDetailPanel"></div>

<!-- 操作按钮栏 -->
<div class="btn-bar">
    <div>
        <button class="btn btn-outline" onclick="navTo('procurement')">← 返回列表</button>
    </div>
    <div class="flex gap-8">
        <button class="btn btn-outline" onclick="showAlert('✏️ 修改功能')">✏️ 修改</button>
        <button class="btn btn-primary" onclick="showAlert('💾 草稿已保存')">💾 保存</button>
        <button class="btn btn-success" onclick="advanceStep()">▶ 提交审批</button>
    </div>
</div>

<script src="../common/scripts.js"></script>
<script>
// ========== 当前状态 ==========
var currentMethod = '公开招标';
var currentStep = 0;
var doneCount = 0;

// ========== 初始化 ==========
(function init() {
    var ctx = null;
    try { ctx = JSON.parse(sessionStorage.getItem('procurementViewContext') || 'null'); } catch(e) {}

    if (ctx) {
        currentMethod = ctx.method || currentMethod;
        currentStep = ctx.currentStep || 0;
        doneCount = ctx.doneCount || 0;

        if (ctx.projectName) {
            document.getElementById('infoTitle').innerHTML = '📄 ' + ctx.projectName;
            document.getElementById('breadProject').textContent = ctx.projectName;
        }
        if (ctx.amount) document.getElementById('infoAmount').textContent = ctx.amount;
        if (ctx.unit) document.getElementById('infoUnit').textContent = ctx.unit;
        if (ctx.plan) document.getElementById('infoPlan').textContent = ctx.plan;
        if (ctx.handler) document.getElementById('infoHandler').textContent = ctx.handler;
        if (ctx.method) document.getElementById('infoMethod').textContent = ctx.method;
        if (ctx.status) {
            var tag = document.getElementById('infoStatusTag');
            tag.textContent = ctx.status;
            tag.className = 'tag ' + (ctx.status === '已完成' ? 'tag-green' : (ctx.status === '进行中' || ctx.status === '审批中' ? 'tag-yellow' : 'tag-gray'));
        }
        sessionStorage.removeItem('procurementViewContext');
    }

    renderSteps();
    loadNodeDetail(currentStep);
})();

// ========== 渲染步骤条（使用 common/scripts.js 的 PROCUREMENT_METHODS）==========
function renderSteps() {
    var data = PROCUREMENT_METHODS[currentMethod];
    if (!data) return;

    document.getElementById('procTitle').textContent = data.title;

    var container = document.getElementById('stepsContainer');
    var html = '';
    for (var i = 0; i < data.steps.length; i++) {
        if (i > 0) html += '<span class="step-arrow">→</span>';
        var cls = '';
        if (i < doneCount) cls += ' done';
        else if (i === currentStep) cls += ' active';
        else cls += ' future';
        var clickable = (i <= doneCount) ? ' onclick="onStepClick(' + i + ')"' : '';
        html += '<span class="step' + cls + '"' + clickable + '><span class="snum">' + (i + 1) + '</span> ' + data.steps[i] + '</span>';
    }
    container.innerHTML = html;

    if (data.steps[currentStep]) {
        document.getElementById('infoNode').textContent = data.steps[currentStep];
    }
}

// ========== 步骤点击 ==========
function onStepClick(index) {
    if (index < doneCount || index === currentStep) {
        currentStep = index;
        loadNodeDetail(index);
        renderSteps();
    }
}

// ========== 加载节点详情（使用 common/scripts.js 的 showStepDetail）==========
function loadNodeDetail(index) {
    var data = PROCUREMENT_METHODS[currentMethod];
    if (!data || !data.steps[index]) return;

    // 调用 common/scripts.js 中的 showStepDetail
    // 它会将面板插入 stepDetailPanel
    showStepDetail(currentMethod, index);

    // 确保 panel 可见
    var panel = document.getElementById('stepDetailPanel');
    if (panel) panel.style.display = '';
}

// ========== 推进步骤 ==========
function advanceStep() {
    var data = PROCUREMENT_METHODS[currentMethod];
    if (!data) return;

    if (currentStep < data.steps.length - 1) {
        doneCount = currentStep + 1;
        currentStep = doneCount;
        renderSteps();
        loadNodeDetail(currentStep);
        showAlert('✅ 已推进至下一节点：' + data.steps[currentStep]);
    } else {
        doneCount = data.steps.length;
        currentStep = doneCount;
        renderSteps();
        document.getElementById('infoStatusTag').textContent = '已完成';
        document.getElementById('infoStatusTag').className = 'tag tag-green';
        showAlert('🎉 招采流程已完成，所有节点已归档。');
    }
}
</script>
</body>
</html>
