<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../common/styles.css">
<style>
    .two-col { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
    .attach-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .attach-table th { text-align: left; padding: 6px 8px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); font-size: 11px; white-space: nowrap; }
    .attach-table td { padding: 6px 8px; border-bottom: 1px solid var(--gray-100); font-size: 11px; }
    .attach-table .op-icon { cursor: pointer; color: var(--primary); font-size: 14px; margin: 0 2px; }
    .attach-table .op-icon.disabled { color: var(--gray-400); cursor: not-allowed; pointer-events: none; }
    .bidder-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .bidder-table th { text-align: left; padding: 8px 10px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); }
    .bidder-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray-100); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body class="content-page" style="padding:0;">

<div class="card" style="margin:0;border:none;box-shadow:none;">
    <div class="card-header"><h3>🔓 开标信息 <span class="tag tag-green">招标通过</span></h3></div>
    <div class="card-body">

        <!-- ===== 第 1 层：开标基础信息 ===== -->
        <div class="two-col">
            <!-- 左侧：情况说明 + 审批状态 -->
            <div>
                <div class="form-group" style="margin-bottom:12px;">
                    <label>开标信息情况说明 <span class="required">*</span></label>
                    <textarea class="form-control" id="bidDesc" rows="4" placeholder="请填写开标情况说明，包括开标时间、地点、参与人员等信息">开标时间：2026-06-20 09:30，地点：集团总部3楼会议室。3家投标单位均按时完成解密，报价有效。</textarea>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>审批状态</label>
                    <input class="form-control" value="已生效" disabled style="background:var(--gray-100);color:var(--gray-600);">
                </div>
            </div>
            <!-- 右侧：投标单位数量 -->
            <div>
                <div class="form-group">
                    <label>投标单位数量 <span class="required">*</span></label>
                    <input class="form-control" type="number" id="bidderCount" min="0" step="1" value="3" oninput="updateBidderRows()" style="font-size:18px;font-weight:700;text-align:center;">
                </div>
                <div class="alert alert-info" style="margin-top:12px;">
                    <span>📌</span>
                    <div>当前已录入 <strong id="bidderCountDisplay">3</strong> 家投标单位</div>
                </div>
            </div>
        </div>

        <!-- ===== 第 2 层：附件操作工具栏 ===== -->
        <div class="flex-between mb-8" style="margin-top:20px;border-top:1px solid var(--gray-200);padding-top:16px;">
            <div class="text-sm fw-600">📎 附件管理</div>
            <div class="flex gap-8">
                <button class="btn btn-sm btn-outline" onclick="createAttachRow()">创建</button>
                <button class="btn btn-sm btn-danger" onclick="batchDeleteAttach()">删除</button>
            </div>
        </div>

        <!-- ===== 第 3 层：附件列表 ===== -->
        <div class="table-wrap">
            <table class="attach-table">
                <thead>
                    <tr>
                        <th style="width:30px;"><input type="checkbox" onclick="toggleAllAttach(this)"></th>
                        <th style="width:100px;">操作</th>
                        <th>附件类型</th>
                        <th>附件文档名称</th>
                        <th>组件名称</th>
                        <th style="width:40px;">预览</th>
                        <th>文件类型</th>
                        <th>文件大小（字节）</th>
                        <th>时戳编码</th>
                        <th>文件上传时间</th>
                        <th>上传操作用户名</th>
                    </tr>
                </thead>
                <tbody id="attachBody">
                    <tr data-id="a1">
                        <td><input type="checkbox" class="attach-cb"></td>
                        <td>
                            <span class="op-icon" onclick="parent.showAlert('⬇️ 下载')" title="下载">⬇️</span>
                            <span class="op-icon" onclick="parent.showAlert('👁️ 预览')" title="预览">👁️</span>
                            <span class="op-icon disabled" title="上传（仅草稿可用）">📤</span>
                            <span class="op-icon" onclick="deleteAttachRow(this)" title="删除">🗑️</span>
                        </td>
                        <td>开标记录</td>
                        <td>ZB-2026-003-开标记录.pdf</td>
                        <td>开标信息</td>
                        <td><span class="op-icon" onclick="parent.showAlert('👁️ 预览文件')">👁️</span></td>
                        <td>pdf</td>
                        <td>1,245,678</td>
                        <td>TS-20260620-001</td>
                        <td>2026-06-20 09:45</td>
                        <td>李经理</td>
                    </tr>
                    <tr data-id="a2">
                        <td><input type="checkbox" class="attach-cb"></td>
                        <td>
                            <span class="op-icon" onclick="parent.showAlert('⬇️ 下载')" title="下载">⬇️</span>
                            <span class="op-icon" onclick="parent.showAlert('👁️ 预览')" title="预览">👁️</span>
                            <span class="op-icon" onclick="uploadAttach(this)" title="上传">📤</span>
                            <span class="op-icon" onclick="deleteAttachRow(this)" title="删除">🗑️</span>
                        </td>
                        <td contenteditable="true">开标现场资料</td>
                        <td contenteditable="true">ZB-2026-003-现场照片.jpg</td>
                        <td contenteditable="true">开标信息</td>
                        <td><span class="op-icon" onclick="parent.showAlert('👁️ 预览文件')">👁️</span></td>
                        <td contenteditable="true">jpg</td>
                        <td contenteditable="true">3,210,456</td>
                        <td contenteditable="true">TS-20260620-002</td>
                        <td contenteditable="true">2026-06-20 10:00</td>
                        <td contenteditable="true">李经理</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="../../common/scripts.js"></script>
<script>
// ===== 投标单位数量 =====
function updateBidderRows() {
    var count = parseInt(document.getElementById('bidderCount').value) || 0;
    document.getElementById('bidderCountDisplay').textContent = count;
}

// ===== 附件管理 =====
function createAttachRow() {
    var tbody = document.getElementById('attachBody');
    var tr = document.createElement('tr');
    tr.setAttribute('data-id', 'a' + Date.now());
    tr.innerHTML = '<td><input type="checkbox" class="attach-cb"></td>' +
        '<td><span class="op-icon" onclick="parent.showAlert(\'⬇️ 下载\')" title="下载">⬇️</span><span class="op-icon" onclick="parent.showAlert(\'👁️ 预览\')" title="预览">👁️</span><span class="op-icon" onclick="uploadAttach(this)" title="上传">📤</span><span class="op-icon" onclick="deleteAttachRow(this)" title="删除">🗑️</span></td>' +
        '<td contenteditable="true">新附件</td>' +
        '<td contenteditable="true"></td>' +
        '<td contenteditable="true">开标信息</td>' +
        '<td><span class="op-icon" onclick="parent.showAlert(\'👁️ 预览文件\')">👁️</span></td>' +
        '<td contenteditable="true">pdf</td>' +
        '<td contenteditable="true"></td>' +
        '<td contenteditable="true"></td>' +
        '<td contenteditable="true">' + new Date().toISOString().replace('T',' ').substring(0,19) + '</td>' +
        '<td contenteditable="true">当前用户</td>';
    tbody.appendChild(tr);
}

function uploadAttach(icon) {
    parent.showAlert('📤 上传附件功能');
    // Prompt for file or simulate upload
}

function deleteAttachRow(icon) {
    var row = icon.closest('tr');
    if (row) row.remove();
}

function batchDeleteAttach() {
    var cbs = document.querySelectorAll('.attach-cb:checked');
    if (cbs.length === 0) { parent.showAlert('⚠️ 请先勾选要删除的附件行。'); return; }
    if (parent.confirm('确认删除选中的 ' + cbs.length + ' 条附件？')) {
        cbs.forEach(function(cb) { var row = cb.closest('tr'); if (row) row.remove(); });
    }
}

function toggleAllAttach(checkbox) {
    var checked = checkbox.checked;
    document.querySelectorAll('.attach-cb').forEach(function(cb) { cb.checked = checked; });
}
</script>
</body>
</html>
