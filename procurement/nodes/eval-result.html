<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../common/styles.css">
<style>
.field-table { width: 100%; }
.field-table td { padding: 5px 12px 5px 0; vertical-align: top; }
.field-table .flabel { width: 140px; color: var(--gray-500); font-size: 12px; white-space: nowrap; }
.field-table .fvalue { font-size: 13px; font-weight: 500; }
.attach-section { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--gray-200); }
</style>
</head>
<body class="content-page" style="padding:0;">

<div class="card" style="margin:0;border:none;box-shadow:none;">
  <div class="card-header"><h3>📊 评标结果 <span class="tag tag-yellow">进行中</span></h3></div>
  <div class="card-body">
    <table class="field-table"><tbody>
      <tr><td class="flabel">关联招采申请编号</td><td class="fvalue">ZB-2026-003</td></tr>
      <tr><td class="flabel">情况说明</td><td class="fvalue">评标委员会已完成初步评审，公示期至2026-07-18</td></tr>
      <tr><td class="flabel">审批状态</td><td class="fvalue"><span class="tag tag-yellow">OA审批中</span></td></tr>
    </tbody></table>

    <div style="margin-top:12px;">
      <div class="text-sm fw-600 mb-4">🏆 中标候选人</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>排名</th><th>投标单位</th><th>投标报价</th><th>综合得分</th><th>推荐结果</th></tr></thead>
          <tbody>
            <tr><td>1</td><td>供应商A</td><td><span class="money">¥1,780,000.00元</span></td><td>95.6</td><td><span class="tag tag-green">推荐中标</span></td></tr>
            <tr><td>2</td><td>供应商B</td><td><span class="money">¥1,825,000.00元</span></td><td>88.3</td><td><span class="tag tag-gray">备选</span></td></tr>
            <tr><td>3</td><td>供应商C</td><td><span class="money">¥1,865,000.00元</span></td><td>76.1</td><td><span class="tag tag-gray">—</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="attach-section">
      <div class="text-sm fw-600 mb-4">📎 附件要求</div>
      <div class="text-sm" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <span class="text-xs" style="color:var(--gray-500);">必选：</span>
        <span class="tag tag-red" style="font-size:11px;">📄 评标报告</span>
        <span class="tag tag-red" style="font-size:11px;">📄 中标候选人公示</span>
        <span class="text-xs" style="color:var(--gray-500);margin-left:12px;">可选：</span>
        <span class="tag tag-gray" style="font-size:11px;">📄 澄清文件</span>
        <span class="tag tag-gray" style="font-size:11px;">📄 质疑及回复文件</span>
      </div>
    </div>

    <div class="flex gap-8 mt-12" style="border-top:1px solid var(--gray-200);padding-top:12px;">
      <button class="btn btn-sm btn-primary" onclick="parent.showAlert('📎 评标报告上传功能')">上传评标报告</button>
      <button class="btn btn-sm btn-outline" onclick="parent.showAlert('✅ 评标结果已确认，进入公示')">确认评标结果</button>
    </div>
  </div>
</div>

<script src="../../common/scripts.js"></script>
</body>
</html>
