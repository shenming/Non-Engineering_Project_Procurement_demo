<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../common/styles.css">
<style>
.field-table { width: 100%; }
.field-table td { padding: 5px 12px 5px 0; vertical-align: top; }
.field-table .flabel { width: 140px; color: var(--gray-500); font-size: 12px; white-space: nowrap; }
.field-table .fvalue { font-size: 13px; font-weight: 500; }
.attach-section { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--gray-200); }
</style>
</head>
<body class="content-page" style="padding:0;">

<div class="card" style="margin:0;border:none;box-shadow:none;">
  <div class="card-header"><h3>📢 中标结果公告 <span class="tag tag-gray">待推进</span></h3></div>
  <div class="card-body">
    <table class="field-table"><tbody>
      <tr><td class="flabel">关联招采申请编号</td><td class="fvalue">ZB-2026-003</td></tr>
      <tr><td class="flabel">情况说明</td><td class="fvalue">发布中标公告，归档采购文件</td></tr>
      <tr><td class="flabel">审批状态</td><td class="fvalue"><span class="tag tag-gray">待提交</span></td></tr>
    </tbody></table>

    <div style="margin-top:12px;">
      <div class="text-sm fw-600 mb-4">📋 公告信息</div>
      <table class="field-table"><tbody>
        <tr><td class="flabel">中标单位</td><td class="fvalue">— 待确认 —</td></tr>
        <tr><td class="flabel">中标金额</td><td class="fvalue">—</td></tr>
        <tr><td class="flabel">公告发布日期</td><td class="fvalue">—</td></tr>
        <tr><td class="flabel">公告媒体</td><td class="fvalue">集团采购平台、中国招标投标公共服务平台</td></tr>
      </tbody></table>
    </div>

    <div class="attach-section">
      <div class="text-sm fw-600 mb-4">📎 附件要求</div>
      <div class="text-sm" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <span class="text-xs" style="color:var(--gray-500);">必选：</span>
        <span class="tag tag-red" style="font-size:11px;">📄 中标结果公告</span>
        <span class="tag tag-red" style="font-size:11px;">📄 中标通知书（用印完成或电子文件）</span>
      </div>
    </div>
  </div>
</div>

<script src="../../common/scripts.js"></script>
</body>
</html>
