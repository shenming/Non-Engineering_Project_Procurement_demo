<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../common/styles.css">
<style>
.field-table { width: 100%; }
.field-table td { padding: 5px 12px 5px 0; vertical-align: top; }
.field-table .flabel { width: 140px; color: var(--gray-500); font-size: 12px; white-space: nowrap; }
.field-table .fvalue { font-size: 13px; font-weight: 500; }
.attach-section { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--gray-200); }
</style>
</head>
<body class="content-page" style="padding:0;">

<div class="card" style="margin:0;border:none;box-shadow:none;">
  <div class="card-header"><h3>📨 拟邀请单位 <span class="tag tag-yellow">进行中</span></h3></div>
  <div class="card-body">
    <table class="field-table"><tbody>
      <tr><td class="flabel">招采申请编号</td><td class="fvalue">ZB-2026-012</td></tr>
      <tr><td class="flabel">招标项目名称</td><td class="fvalue">年度培训服务采购</td></tr>
      <tr><td class="flabel">拟邀请供应商</td><td class="fvalue">培训机构A / 培训机构B / 培训机构C</td></tr>
      <tr><td class="flabel">邀请理由说明</td><td class="fvalue">3家机构均具有培训资质和经验</td></tr>
      <tr><td class="flabel">评标办法</td><td class="fvalue">最低价中标法</td></tr>
      <tr><td class="flabel">需求部门</td><td class="fvalue">人力资源部</td></tr>
      <tr><td class="flabel">经办人</td><td class="fvalue">陈芳</td></tr>
    </tbody></table>

    <div style="margin-top:12px;">
      <div class="text-sm fw-600 mb-4">🏢 邀请单位清单</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>序号</th><th>供应商名称</th><th>资质说明</th><th>邀请状态</th><th>备注</th></tr></thead>
          <tbody>
            <tr><td>1</td><td>培训机构A</td><td>具备员工培训资质，多年行业经验</td><td><span class="tag tag-green">已确认参与</span></td><td>—</td></tr>
            <tr><td>2</td><td>培训机构B</td><td>具备员工培训资质，价格有竞争力</td><td><span class="tag tag-green">已确认参与</span></td><td>—</td></tr>
            <tr><td>3</td><td>培训机构C</td><td>具备员工培训资质，课程体系完整</td><td><span class="tag tag-green">已确认参与</span></td><td>—</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="attach-section">
      <div class="text-sm fw-600 mb-4">📎 附件要求</div>
      <div class="text-sm" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <span class="text-xs" style="color:var(--gray-500);">必选：</span>
        <span class="tag tag-red" style="font-size:11px;">📄 邀请供应商说明文件</span>
        <span class="text-xs" style="color:var(--gray-500);margin-left:12px;">可选：</span>
        <span class="tag tag-gray" style="font-size:11px;">📄 供应商资质证明</span>
      </div>
    </div>

    <div class="flex gap-8 mt-12" style="border-top:1px solid var(--gray-200);padding-top:12px;">
      <button class="btn btn-sm btn-outline" onclick="parent.showAlert('📄 上传邀请说明文件')">上传附件</button>
      <button class="btn btn-sm btn-primary" onclick="parent.showAlert('✅ 邀请已确认')">确认邀请</button>
    </div>
  </div>
</div>

<script src="../../common/scripts.js"></script>
</body>
</html>
