<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../common/styles.css">
    <style>
        .steps-bar { display: flex; align-items: center; gap: 0; padding: 14px 24px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); }
        .step-node { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--gray-400); }
        .step-node .num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--gray-200); color: var(--gray-500); font-size: 12px; font-weight: 600; }
        .step-node.active { color: var(--primary); }
        .step-node.active .num { background: var(--primary); color: #fff; }
        .step-node.done { color: var(--success); }
        .step-node.done .num { background: var(--success); color: #fff; }
        .step-arrow { margin: 0 10px; color: var(--gray-300); font-size: 14px; }
        .field-locked { background: var(--gray-100) !important; color: var(--gray-600) !important; cursor: not-allowed; }
        .limit-exceeded { border-color: var(--danger) !important; background: #fef2f2 !important; }
        .method-hint { font-size: 11px; padding: 3px 0; }
        .method-hint-best { color: #059669; }
        .method-hint-ok { color: var(--gray-600); }
        .method-hint-warn { color: var(--gray-400); }
    </style>
</head>
<body class="content-page">

<div class="sub-navbar">
    <button class="btn btn-sm btn-outline" onclick="navTo('procurement')" style="margin-right:8px;">← 返回列表</button>
    <span class="sub-nav-title">⚡ 发起采购申请</span>
    <span class="breadcrumb">
        <a onclick="navTo('procurement')">采购过程列表</a><span> › </span>发起申请
    </span>
</div>

<!-- 步骤指示器 -->
<div class="card" style="margin-bottom:12px;">
    <div class="card-body" style="padding:0;">
        <div class="steps-bar" id="stepsBar">
            <span class="step-node active" id="stepNode1"><span class="num">1</span> 选择招采项</span>
            <span class="step-arrow">→</span>
            <span class="step-node" id="stepNode2"><span class="num">2</span> 填写申请信息</span>
        </div>
    </div>
</div>

<!-- ===== 步骤一：选择招采项 ===== -->
<div id="step1Content">
    <div class="card">
        <div class="card-body">
            <div class="flex gap-12 mb-12" style="flex-wrap:wrap;">
                <input class="form-control form-control-sm" id="searchPlanId" placeholder="采购计划编号模糊搜索..." style="width:200px;" oninput="filterPlanItems()">
                <input class="form-control form-control-sm" id="searchContent" placeholder="采购内容模糊搜索..." style="width:200px;" oninput="filterPlanItems()">
                <button class="btn btn-sm btn-outline" onclick="resetStep1Filter()">重置</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px;">选择</th>
                            <th>计划编号</th>
                            <th>采购内容</th>
                            <th>所属单位</th>
                            <th>采购类别</th>
                            <th>预选采购方式</th>
                            <th>预估金额(万)</th>
                            <th>采购限价(万)</th>
                            <th>经办人</th>
                        </tr>
                    </thead>
                    <tbody id="planItemTableBody"></tbody>
                </table>
            </div>
            <div class="text-xs text-muted mt-8">仅显示已生效且未被引用的招采项。共 <strong id="planItemCount">0</strong> 条可用。</div>
        </div>
        <div class="card-header" style="border-top:1px solid var(--gray-200);background:#fff;">
            <span></span>
            <div class="flex gap-8">
                <button class="btn btn-outline" onclick="navTo('procurement')">取消</button>
                <button class="btn btn-primary" id="btnNextStep" disabled onclick="goToStep2()">下一步 →</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== 步骤二：填写采购申请 ===== -->
<div id="step2Content" style="display:none;">
    <div class="card">
        <div class="card-body">
            <div style="margin-bottom:16px;padding:10px 14px;background:#f0f9ff;border-radius:6px;border:1px solid #bae6fd;">
                <span class="text-sm fw-600">📌 已选招采项：</span>
                <span class="text-sm" id="step2SelectedInfo"></span>
            </div>

            <div class="form-row">
                <div class="form-group"><label>关联招采计划编号</label><input class="form-control field-locked" id="s2PlanNo" disabled></div>
                <div class="form-group"><label>所属单位</label><input class="form-control field-locked" id="s2Unit" disabled></div>
            </div>
            <div class="form-group"><label>招标项目名称</label><input class="form-control field-locked" id="s2ProjectName" disabled></div>
            <div class="form-row">
                <div class="form-group"><label>采购类别</label><select class="form-control field-locked" id="s2CatParent" disabled><option value="">—</option></select></div>
                <div class="form-group"><label>二级品类</label><select class="form-control field-locked" id="s2CatSub" disabled><option value="">—</option></select></div>
            </div>
            <div class="form-group"><label>采购内容</label><input class="form-control field-locked" id="s2ProcContent" disabled></div>
            <div class="form-group"><label>采购方式</label><input class="form-control field-locked" id="s2ProcMethod" disabled></div>

            <!-- 采购方式推荐提示 -->
            <div id="s2MethodHints" style="margin-bottom:12px;"></div>

            <!-- 直接采购原因选择 -->
            <div id="s2DirectPurchaseSection" style="display:none;">
                <div class="card" style="margin-bottom:16px;border-color:var(--warning);">
                    <div class="card-header" style="background:#fffbeb;"><h3>📌 直接采购原因选择</h3></div>
                    <div class="card-body" id="s2DpConditionsBody"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>采购金额含税（元）<span class="required">*</span></label>
                    <input class="form-control" type="number" id="s2ProcAmount" step="0.01" oninput="validateStep2Limit()">
                    <span class="text-xs" id="s2LimitHint" style="color:var(--gray-500);">计划上限：<span id="s2LimitMax"></span> 元</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group"><label>拟发标时间</label><input class="form-control" type="date" id="s2BidIssueDate"></div>
                <div class="form-group"><label>计划开标时间</label><input class="form-control" type="date" id="s2BidOpenDate"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>计划定标时间</label><input class="form-control" type="date" id="s2BidAwardDate"></div>
                <div class="form-group"><label>公告发布时间</label><input class="form-control" type="date" id="s2AnnounceDate"></div>
            </div>
            <div class="form-group">
                <label>附件（招标文件/采购需求等）</label>
                <input class="form-control" type="file" multiple>
                <span class="text-xs text-muted">支持上传招标文件、采购需求等佐证材料</span>
            </div>
            <div class="form-group" id="s2DpReasonFileGroup" style="display:none;">
                <label>📎 直接采购原因说明文件 <span class="required">*</span></label>
                <input class="form-control" type="file" id="s2DpReasonFile">
                <span class="text-xs text-muted">请上传证明合理性的文件资料</span>
            </div>
            <div class="form-group">
                <label>采购范围及说明</label>
                <textarea class="form-control" rows="4" id="s2Description" placeholder="请描述本次采购的具体范围、服务/货物要求、质量标准和补充说明等"></textarea>
            </div>
            <div class="text-xs text-muted mt-8" id="s2DpFlowHint" style="display:none;"></div>
            <div class="text-xs text-muted mt-8" id="s2NormalFlowHint">📌 审批通过后，流程将在OA中流转，用印文件回传系统。</div>
        </div>
        <div class="card-header" style="border-top:1px solid var(--gray-200);background:#fff;">
            <span></span>
            <div class="flex gap-8">
                <button class="btn btn-outline" onclick="goBackToStep1()">← 上一步</button>
                <button class="btn btn-primary" id="btnConfirm" onclick="confirmProcurement()">确认</button>
            </div>
        </div>
    </div>
</div>

<script src="../common/scripts.js"></script>
<script>
// ========== 招采项数据（含状态与引用状态） ==========
var PLAN_ITEMS = [
    { id: 'PL-2026-0001-1', planId: 'PL-2026-0001', planName: '2026年度成员企业A采购计划', content: '年度法律顾问服务', unit: '成员企业A', cat: '服务类 · 法律服务', method: '直接采购', amount: 15.0, limit: 12.0, handler: '张明', status: '已完成', refStatus: '已引用' },
    { id: 'PL-2026-0002-1', planId: 'PL-2026-0002', planName: '2026年度集团总部采购计划', content: '集团年度物业服务', unit: '集团总部', cat: '服务类 · 物业服务', method: '公开招标', amount: 186.5, limit: 180.0, handler: '李经理', status: '执行中', refStatus: '已引用' },
    { id: 'PL-2026-0002-2', planId: 'PL-2026-0002', planName: '2026年度集团总部采购计划', content: '生产设备维护服务', unit: '集团总部', cat: '服务类 · 维护服务', method: '邀请招标', amount: 67.0, limit: 67.0, handler: '赵岩', status: '草稿', refStatus: '未引用' },
    { id: 'PL-2026-0010-1', planId: 'PL-2026-0010', planName: '2026年度成员企业B采购计划', content: 'IT设备采购', unit: '成员企业B', cat: '货物类 · IT类', method: '邀请招标', amount: 45.0, limit: 42.0, handler: '王磊', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0015-1', planId: 'PL-2026-0015', planName: '2026年度成员企业A采购计划', content: '年度培训服务', unit: '成员企业A', cat: '服务类 · 培训服务', method: '询比采购', amount: 28.0, limit: 25.0, handler: '陈芳', status: '已生效', refStatus: '未引用' }
];

function getAvailableItems() {
    return PLAN_ITEMS.filter(function(item) {
        return item.status === '已生效' && item.refStatus === '未引用';
    });
}

var selectedItem = null;
var step2Limit = 0;

(function init() {
    showStep1();
})();

function showStep1() {
    document.getElementById('step1Content').style.display = '';
    document.getElementById('step2Content').style.display = 'none';
    document.getElementById('stepNode1').classList.add('active');
    document.getElementById('stepNode1').classList.remove('done');
    document.getElementById('stepNode2').classList.remove('active', 'done');
    document.getElementById('btnNextStep').disabled = true;
    filterPlanItems();
}

function resetStep1Filter() {
    document.getElementById('searchPlanId').value = '';
    document.getElementById('searchContent').value = '';
    filterPlanItems();
}

function filterPlanItems() {
    var kw1 = document.getElementById('searchPlanId').value.toLowerCase();
    var kw2 = document.getElementById('searchContent').value.toLowerCase();
    var available = getAvailableItems();
    var filtered = available.filter(function(item) {
        var match1 = !kw1 || item.planId.toLowerCase().indexOf(kw1) !== -1;
        var match2 = !kw2 || item.content.toLowerCase().indexOf(kw2) !== -1;
        return match1 && match2;
    });
    document.getElementById('planItemCount').textContent = available.length;
    selectedItem = null;
    document.getElementById('btnNextStep').disabled = true;
    renderPlanItems(filtered);
}

function renderPlanItems(items) {
    var tbody = document.getElementById('planItemTableBody');
    var html = '';
    items.forEach(function(item) {
        html += '<tr style="cursor:pointer;" onclick="selectPlanRow(this)" data-item="' + encodeURIComponent(JSON.stringify(item)) + '">';
        html += '<td><input type="radio" name="planSelect" style="pointer-events:none;"></td>';
        html += '<td><strong>' + item.planId + '</strong><br><span class="text-xs text-muted">' + item.planName + '</span></td>';
        html += '<td>' + item.content + '</td>';
        html += '<td>' + item.unit + '</td>';
        html += '<td>' + renderCategoryTag(item.cat) + '</td>';
        html += '<td><span class="tag tag-blue">' + item.method + '</span></td>';
        html += '<td><span class="money">' + item.amount.toFixed(1) + '</span></td>';
        html += '<td>' + item.limit.toFixed(1) + '</td>';
        html += '<td>' + item.handler + '</td>';
        html += '</tr>';
    });
    tbody.innerHTML = html || '<tr><td colspan="9" class="text-muted text-sm" style="text-align:center;padding:20px;">无匹配的可用招采项</td></tr>';
}

function selectPlanRow(row) {
    var allRows = document.querySelectorAll('#planItemTableBody tr');
    allRows.forEach(function(r) { r.classList.remove('selected'); });
    row.classList.add('selected');
    row.querySelector('input[type="radio"]').checked = true;
    selectedItem = JSON.parse(decodeURIComponent(row.getAttribute('data-item')));
    document.getElementById('btnNextStep').disabled = false;
}

function goToStep2() {
    if (!selectedItem) return;

    document.getElementById('step1Content').style.display = 'none';
    document.getElementById('step2Content').style.display = '';
    document.getElementById('stepNode1').classList.remove('active');
    document.getElementById('stepNode1').classList.add('done');
    document.getElementById('stepNode2').classList.add('active');

    document.getElementById('s2PlanNo').value = selectedItem.planId + ' · ' + selectedItem.planName;
    document.getElementById('s2Unit').value = selectedItem.unit;
    document.getElementById('s2ProjectName').value = selectedItem.content;
    document.getElementById('s2ProcContent').value = selectedItem.content;
    document.getElementById('s2ProcMethod').value = selectedItem.method;

    var parent = extractParentCategory(selectedItem.cat);
    var sub = extractSubCategory(selectedItem.cat);
    populateStep2Category(parent, sub);

    step2Limit = selectedItem.limit * 10000;
    var defaultAmount = Math.min(selectedItem.amount * 10000, step2Limit);
    document.getElementById('s2ProcAmount').value = defaultAmount.toFixed(2);
    document.getElementById('s2LimitMax').textContent = step2Limit.toFixed(2);
    document.getElementById('s2ProcAmount').classList.remove('limit-exceeded');

    document.getElementById('step2SelectedInfo').textContent = selectedItem.planId + ' · ' + selectedItem.content + '（' + selectedItem.method + '）';

    renderStep2MethodHints(parent, selectedItem.method);

    if (selectedItem.method === '直接采购') {
        initStep2DirectPurchase();
    } else {
        document.getElementById('s2DirectPurchaseSection').style.display = 'none';
        document.getElementById('s2DpReasonFileGroup').style.display = 'none';
        document.getElementById('s2DpFlowHint').style.display = 'none';
        document.getElementById('s2NormalFlowHint').style.display = '';
    }

    document.getElementById('s2BidIssueDate').value = '';
    document.getElementById('s2BidOpenDate').value = '';
    document.getElementById('s2BidAwardDate').value = '';
    document.getElementById('s2AnnounceDate').value = '';
    document.getElementById('s2Description').value = '';
}

function populateStep2Category(parent, sub) {
    var parentEl = document.getElementById('s2CatParent');
    var childEl = document.getElementById('s2CatSub');
    parentEl.innerHTML = '<option value="' + parent + '" selected>' + parent + '</option>';
    var subs = CATEGORY_TREE[parent] || [];
    childEl.innerHTML = '<option value="">—</option>';
    subs.forEach(function(s) {
        var sel = (s === sub) ? ' selected' : '';
        childEl.innerHTML += '<option value="' + s + '"' + sel + '>' + s + '</option>';
    });
}

function renderStep2MethodHints(category, selectedMethod) {
    var amt = parseFloat(document.getElementById('s2ProcAmount').value) || 0;
    var recs = recommendProcurementMethod(category || '', amt);
    var html = '';
    for (var i = 0; i < recs.length; i++) {
        var r = recs[i];
        var isSelected = (r.method === selectedMethod);
        var cls = r.isBest ? 'method-hint-best' : (r.compliant ? 'method-hint-ok' : 'method-hint-warn');
        var prefix = isSelected ? '👉 ' : '';
        html += '<div class="method-hint ' + cls + '" style="' + (isSelected ? 'font-weight:600;' : '') + '">' + prefix + r.tag + ' — ' + r.reason + '</div>';
    }
    document.getElementById('s2MethodHints').innerHTML = html;
}

function initStep2DirectPurchase() {
    var section = document.getElementById('s2DirectPurchaseSection');
    var body = document.getElementById('s2DpConditionsBody');
    section.style.display = '';
    var html = '';
    DIRECT_PURCHASE_CONDITIONS.forEach(function(c) {
        var checked = (c.id === 'D1') ? ' checked' : '';
        html += '<label style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;cursor:pointer;"><input type="radio" name="s2DpCond" value="' + c.id + '"' + checked + ' style="margin-top:3px;" onchange="onStep2DpChange()"><div><strong>' + c.label + '</strong><br><span class="text-xs text-muted">' + c.desc + '</span></div></label>';
    });
    body.innerHTML = html;
    onStep2DpChange();
}

function onStep2DpChange() {
    var checked = document.querySelector('input[name="s2DpCond"]:checked');
    if (!checked) return;
    var isD1 = (checked.value === 'D1');
    document.getElementById('s2DpReasonFileGroup').style.display = isD1 ? 'none' : '';
    document.getElementById('s2NormalFlowHint').style.display = 'none';
    var hint = document.getElementById('s2DpFlowHint');
    hint.style.display = '';
    if (isD1) {
        hint.innerHTML = '✅ <strong>流程合并说明：</strong>合同估算价＜100,000.00元，采购申请与确定采购结果合并，审批通过后可直接填写采购结果。';
        document.getElementById('btnConfirm').textContent = '提交审批并进入采购结果';
    } else {
        hint.innerHTML = '📌 <strong>流程分开说明：</strong>该情形下采购申请审批通过后，需单独提交确定采购结果流程。';
        document.getElementById('btnConfirm').textContent = '确认';
    }
}

function validateStep2Limit() {
    var input = document.getElementById('s2ProcAmount');
    var val = parseFloat(input.value);
    if (!isNaN(val) && val > step2Limit) {
        input.classList.add('limit-exceeded');
        document.getElementById('s2LimitHint').innerHTML = '<span style="color:var(--danger);">⚠ 超出计划限价（≤' + step2Limit.toFixed(2) + ' 元）</span>';
    } else {
        input.classList.remove('limit-exceeded');
        document.getElementById('s2LimitHint').innerHTML = '计划上限：<span>' + step2Limit.toFixed(2) + '</span> 元';
    }
    renderStep2MethodHints(extractParentCategory(selectedItem.cat), document.getElementById('s2ProcMethod').value);
}

function goBackToStep1() {
    showStep1();
}

function confirmProcurement() {
    var limitVal = parseFloat(document.getElementById('s2ProcAmount').value);
    if (limitVal > step2Limit) {
        showAlert('⚠️ 采购金额超出计划限价，请调整后提交。');
        return;
    }
    var method = document.getElementById('s2ProcMethod').value;
    if (method === '直接采购') {
        var checked = document.querySelector('input[name="s2DpCond"]:checked');
        if (!checked) {
            showAlert('⚠️ 请选择直接采购原因。');
            return;
        }
        var isD1 = (checked.value === 'D1');
        if (!isD1) {
            var fi = document.getElementById('s2DpReasonFile');
            if (fi && !fi.files.length) {
                showAlert('⚠️ 请上传直接采购原因说明文件。');
                return;
            }
        }
        showAlert(isD1 ? '✅ 采购申请已提交，请进入采购结果填写页面。' : '✅ 采购申请已提交，审批通过后请单独提交确定采购结果。');
    } else {
        showAlert('✅ 采购申请已提交，进入OA审批流程。');
    }

    // 标记招采项为「已引用」
    var refMap = {};
    try { refMap = JSON.parse(sessionStorage.getItem('planItemRefStatus') || '{}'); } catch(e) {}
    refMap[selectedItem.id] = '已引用';
    sessionStorage.setItem('planItemRefStatus', JSON.stringify(refMap));

    // 设置 view.html 上下文
    sessionStorage.setItem('procurementViewContext', JSON.stringify({
        method: selectedItem.method,
        projectName: selectedItem.content,
        amount: '¥' + (selectedItem.amount * 10000).toFixed(2) + '元',
        unit: selectedItem.unit,
        plan: selectedItem.planId + ' · ' + selectedItem.planName,
        handler: selectedItem.handler,
        status: '进行中',
        currentStep: 0,
        doneCount: 0
    }));

    navTo('procurement', 'procurement/view.html');
}
</script>
</body>
</html>
