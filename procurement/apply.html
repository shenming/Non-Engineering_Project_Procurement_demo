<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../common/styles.css">
    <style>
        .steps-bar { display: flex; align-items: center; gap: 0; padding: 14px 24px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); }
        .step-node { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--gray-400); }
        .step-node .num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--gray-200); color: var(--gray-500); font-size: 12px; font-weight: 600; }
        .step-node.active { color: var(--primary); }
        .step-node.active .num { background: var(--primary); color: #fff; }
        .step-node.done { color: var(--success); }
        .step-node.done .num { background: var(--success); color: #fff; }
        .step-arrow { margin: 0 10px; color: var(--gray-300); font-size: 14px; }
        .field-locked { background: var(--gray-100) !important; color: var(--gray-600) !important; cursor: not-allowed; }
        .limit-exceeded { border-color: var(--danger) !important; background: #fef2f2 !important; }
        .method-hint { font-size: 11px; padding: 3px 0; }
        .method-hint-best { color: #059669; }
        .method-hint-ok { color: var(--gray-600); }
        .method-hint-warn { color: var(--gray-400); }
        th .th-filter { margin-top: 3px; }
        th .th-filter select { font-size: 11px; padding: 2px 4px; height: 24px; }
        th.sorter { cursor: pointer; user-select: none; }
        th.sorter:hover { color: var(--primary); }
        th.sorter .sort-icon { font-size: 10px; margin-left: 2px; color: var(--gray-400); }
    </style>
</head>
<body class="content-page">

<div class="sub-navbar">
    <button class="btn btn-sm btn-outline" onclick="navTo('procurement')" style="margin-right:8px;">← 返回列表</button>
    <span class="sub-nav-title">⚡ 发起采购申请</span>
    <span class="breadcrumb">
        <a onclick="navTo('procurement')">采购过程列表</a><span> › </span>发起申请
    </span>
</div>

<!-- 步骤指示器 -->
<div class="card" style="margin-bottom:12px;">
    <div class="card-body" style="padding:0;">
        <div class="steps-bar" id="stepsBar">
            <span class="step-node active" id="stepNode1"><span class="num">1</span> 选择招采项</span>
            <span class="step-arrow">→</span>
            <span class="step-node" id="stepNode2"><span class="num">2</span> 填写申请信息</span>
        </div>
    </div>
</div>

<!-- ===== 步骤一：选择招采项 ===== -->
<div id="step1Content">
    <div class="card">
        <div class="card-body">
            <div class="flex gap-12 mb-12" style="flex-wrap:wrap;">
                <input class="form-control form-control-sm" id="searchPlanId" placeholder="采购计划名称模糊搜索..." style="width:200px;">
                <input class="form-control form-control-sm" id="searchContent" placeholder="采购内容模糊搜索..." style="width:200px;">
                <button class="btn btn-sm btn-primary" onclick="filterPlanItems()">🔍 搜索</button>
                <button class="btn btn-sm btn-outline" onclick="resetStep1Filter()">重置</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px;">选择</th>
                            <th class="sorter" onclick="sortPlanItems('planName')">采购计划名称 <span class="sort-icon" id="sortIcon-planName">↕</span></th>
                            <th class="sorter" onclick="sortPlanItems('content')">采购内容 <span class="sort-icon" id="sortIcon-content">↕</span></th>
                            <th>采购类别<div class="th-filter"><select class="form-control form-control-sm" onchange="filterPlanItems()" id="thFilterCat"><option value="all">全部</option><option value="货物类">货物类</option><option value="服务类">服务类</option></select></div></th>
                            <th>采购方式<div class="th-filter"><select class="form-control form-control-sm" onchange="filterPlanItems()" id="thFilterMethod"><option value="all">全部</option><option value="公开招标">公开招标</option><option value="邀请招标">邀请招标</option><option value="询比采购">询比采购</option><option value="谈判采购">谈判采购</option><option value="直接采购">直接采购</option></select></div></th>
                            <th class="sorter" onclick="sortPlanItems('note')">采购项说明 <span class="sort-icon" id="sortIcon-note">↕</span></th>
                            <th class="sorter" onclick="sortPlanItems('amount')">采购金额 <span class="sort-icon" id="sortIcon-amount">↕</span></th>
                            <th class="sorter" onclick="sortPlanItems('schedule')">计划日期 <span class="sort-icon" id="sortIcon-schedule">↕</span></th>
                        </tr>
                    </thead>
                    <tbody id="planItemTableBody"></tbody>
                </table>
            </div>
            <div class="flex-between mt-8" style="display:flex;align-items:center;justify-content:space-between;">
                <div class="text-xs text-muted">仅用户数据权限下显示已生效且未被引用的招采项。共 <strong id="planItemCount">0</strong> 条可用。</div>
                <div class="flex gap-8" style="display:flex;align-items:center;gap:8px;" id="paginationControls">
                    <span class="text-xs text-muted" id="pageInfo"></span>
                    <button class="btn btn-xs btn-outline" id="prevPageBtn" onclick="prevPage()" disabled>← 上一页</button>
                    <button class="btn btn-xs btn-outline" id="nextPageBtn" onclick="nextPage()" disabled>下一页 →</button>
                </div>
            </div>
        </div>
        <div class="card-header" style="border-top:1px solid var(--gray-200);background:#fff;">
            <span></span>
            <div class="flex gap-8">
                <button class="btn btn-outline" onclick="navTo('procurement')">取消</button>
                <button class="btn btn-primary" id="btnNextStep" disabled onclick="goToStep2()">下一步 →</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== 步骤二：填写采购申请 ===== -->
<div id="step2Content" style="display:none;">
    <div class="card">
        <div class="card-body">
            <div style="margin-bottom:16px;padding:10px 14px;background:#f0f9ff;border-radius:6px;border:1px solid #bae6fd;">
                <span class="text-sm fw-600">📌 已选招采项：</span>
                <span class="text-sm" id="step2SelectedInfo"></span>
            </div>
            <div class="form-row">
                <div class="form-group"><label>关联招采计划编号</label><input class="form-control field-locked" id="s2PlanNo" disabled></div>
                <div class="form-group"><label>所属单位</label><input class="form-control field-locked" id="s2Unit" disabled></div>
            </div>
            <div class="form-group"><label>招标项目名称</label><input class="form-control field-locked" id="s2ProjectName" disabled></div>
            <div class="form-row">
                <div class="form-group"><label>采购类别</label><select class="form-control field-locked" id="s2CatParent" disabled><option value="">—</option></select></div>
                <div class="form-group"><label>二级品类</label><select class="form-control field-locked" id="s2CatSub" disabled><option value="">—</option></select></div>
            </div>
            <div class="form-group"><label>采购内容</label><input class="form-control field-locked" id="s2ProcContent" disabled></div>
            <div class="form-group"><label>采购方式</label><input class="form-control field-locked" id="s2ProcMethod" disabled></div>
            <div id="s2MethodHints" style="margin-bottom:12px;"></div>
            <div id="s2DirectPurchaseSection" style="display:none;">
                <div class="card" style="margin-bottom:16px;border-color:var(--warning);">
                    <div class="card-header" style="background:#fffbeb;"><h3>📌 直接采购原因选择</h3></div>
                    <div class="card-body" id="s2DpConditionsBody"></div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>采购金额含税（元）<span class="required">*</span></label>
                    <input class="form-control" type="number" id="s2ProcAmount" step="0.01" oninput="validateStep2Limit()">
                    <span class="text-xs" id="s2LimitHint" style="color:var(--gray-500);">计划上限：<span id="s2LimitMax"></span> 元</span>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>拟发标时间</label><input class="form-control" type="date" id="s2BidIssueDate"></div>
                <div class="form-group"><label>计划开标时间</label><input class="form-control" type="date" id="s2BidOpenDate"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>计划定标时间</label><input class="form-control" type="date" id="s2BidAwardDate"></div>
                <div class="form-group"><label>公告发布时间</label><input class="form-control" type="date" id="s2AnnounceDate"></div>
            </div>
            <div class="form-group">
                <label>附件（招标文件/采购需求等）</label>
                <input class="form-control" type="file" multiple>
                <span class="text-xs text-muted">支持上传招标文件、采购需求等佐证材料</span>
            </div>
            <div class="form-group" id="s2DpReasonFileGroup" style="display:none;">
                <label>📎 直接采购原因说明文件 <span class="required">*</span></label>
                <input class="form-control" type="file" id="s2DpReasonFile">
                <span class="text-xs text-muted">请上传证明合理性的文件资料</span>
            </div>
            <div class="form-group">
                <label>采购范围及说明</label>
                <textarea class="form-control" rows="4" id="s2Description" placeholder="请描述本次采购的具体范围、服务/货物要求、质量标准和补充说明等"></textarea>
            </div>
            <div class="text-xs text-muted mt-8" id="s2DpFlowHint" style="display:none;"></div>
            <div class="text-xs text-muted mt-8" id="s2NormalFlowHint">📌 审批通过后，流程将在OA中流转，用印文件回传系统。</div>
        </div>
        <div class="card-header" style="border-top:1px solid var(--gray-200);background:#fff;">
            <span></span>
            <div class="flex gap-8">
                <button class="btn btn-outline" onclick="goBackToStep1()">← 上一步</button>
                <button class="btn btn-primary" id="btnConfirm" onclick="confirmProcurement()">确认</button>
            </div>
        </div>
    </div>
</div>

<script src="../common/scripts.js"></script>
<script>
var PLAN_ITEMS = [
    { id: 'PL-2026-0020-1', planId: 'PL-2026-0020', planName: '2026年度成员企业A采购计划', content: '办公家具批量采购', unit: '成员企业A', cat: '货物类 · 家具类', method: '公开招标', note: '', schedule: '2026-03 ~ 2026-05', amount: 280.0, limit: 260.0, handler: '李华', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0021-1', planId: 'PL-2026-0021', planName: '2026年度集团总部采购计划', content: '弱电系统维保服务', unit: '集团总部', cat: '服务类 · 维护服务', method: '邀请招标', note: '', schedule: '2026-04 ~ 2026-12', amount: 85.0, limit: 80.0, handler: '王工', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0022-1', planId: 'PL-2026-0022', planName: '2026年度成员企业B采购计划', content: '台式计算机采购', unit: '成员企业B', cat: '货物类 · IT类', method: '询比采购', note: '', schedule: '2026-05 ~ 2026-06', amount: 60.0, limit: 58.0, handler: '刘工', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0023-1', planId: 'PL-2026-0023', planName: '2026年度成员企业A采购计划', content: '信息化建设咨询服务', unit: '成员企业A', cat: '服务类 · 咨询服务', method: '谈判采购', note: '技术复杂/性质特殊', schedule: '2026-06 ~ 2026-08', amount: 120.0, limit: 110.0, handler: '张明', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0024-1', planId: 'PL-2026-0024', planName: '2026年度成员企业A采购计划', content: '数据安全审计服务', unit: '成员企业A', cat: '服务类 · 咨询服务', method: '直接采购', note: '涉密/商业秘密', schedule: '2026-07 ~ 2026-09', amount: 50.0, limit: 48.0, handler: '陈芳', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0025-1', planId: 'PL-2026-0025', planName: '2026年度集团总部采购计划', content: '办公用品零星采购', unit: '集团总部', cat: '货物类 · 办公用品类', method: '直接采购', note: '合同估算价＜100,000.00元', schedule: '2026-08 ~ 2026-09', amount: 8.0, limit: 8.0, handler: '赵岩', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0026-1', planId: 'PL-2026-0026', planName: '2026年度成员企业A采购计划', content: '印刷服务采购', unit: '成员企业A', cat: '服务类 · 其他服务', method: '询比采购', note: '', schedule: '2026-09 ~ 2026-10', amount: 35.0, limit: 32.0, handler: '李华', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0027-1', planId: 'PL-2026-0027', planName: '2026年度成员企业B采购计划', content: '空调维保服务', unit: '成员企业B', cat: '服务类 · 维护服务', method: '邀请招标', note: '', schedule: '2026-06 ~ 2026-12', amount: 48.0, limit: 45.0, handler: '刘工', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0028-1', planId: 'PL-2026-0028', planName: '2026年度集团总部采购计划', content: '办公软件授权采购', unit: '集团总部', cat: '货物类 · IT类', method: '直接采购', note: '不可替代专利/专有技术', schedule: '2026-05 ~ 2026-06', amount: 75.0, limit: 72.0, handler: '王工', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0029-1', planId: 'PL-2026-0029', planName: '2026年度成员企业A采购计划', content: '档案数字化服务', unit: '成员企业A', cat: '服务类 · 其他服务', method: '公开招标', note: '', schedule: '2026-08 ~ 2026-11', amount: 200.0, limit: 195.0, handler: '张明', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0030-1', planId: 'PL-2026-0030', planName: '2026年度成员企业B采购计划', content: '劳保用品采购', unit: '成员企业B', cat: '货物类 · 劳保用品类', method: '询比采购', note: '', schedule: '2026-04 ~ 2026-05', amount: 25.0, limit: 24.0, handler: '刘工', status: '已生效', refStatus: '未引用' },
    { id: 'PL-2026-0031-1', planId: 'PL-2026-0031', planName: '2026年度集团总部采购计划', content: '法律顾问服务续签', unit: '集团总部', cat: '服务类 · 法律服务', method: '直接采购', note: '涉密/商业秘密', schedule: '2026-01 ~ 2026-12', amount: 30.0, limit: 28.0, handler: '李经理', status: '已生效', refStatus: '未引用' }
];

var PAGE_SIZE = 5, currentPage = 1, sortState = { field: '', asc: true }, selectedItem = null, step2Limit = 0;

function getAvailableItems() { return PLAN_ITEMS.filter(function(i) { return i.status === '已生效' && i.refStatus === '未引用'; }); }

function getFilteredAndSorted() {
    var kw1 = document.getElementById('searchPlanId').value.toLowerCase(), kw2 = document.getElementById('searchContent').value.toLowerCase();
    var catFilter = document.getElementById('thFilterCat').value, methodFilter = document.getElementById('thFilterMethod').value;
    var filtered = getAvailableItems().filter(function(item) {
        var m1 = !kw1 || item.planName.toLowerCase().indexOf(kw1) !== -1 || item.planId.toLowerCase().indexOf(kw1) !== -1;
        var m2 = !kw2 || item.content.toLowerCase().indexOf(kw2) !== -1;
        var mc = catFilter === 'all' || item.cat.indexOf(catFilter) !== -1;
        var mm = methodFilter === 'all' || item.method === methodFilter;
        return m1 && m2 && mc && mm;
    });
    if (sortState.field) { var f = sortState.field; filtered.sort(function(a, b) { var va = a[f]||'', vb = b[f]||''; if(f==='amount'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;return sortState.asc?va-vb:vb-va;} else {va=va.toString().toLowerCase();vb=vb.toString().toLowerCase();if(va<vb)return sortState.asc?-1:1;if(va>vb)return sortState.asc?1:-1;return 0;} }); }
    return filtered;
}

function renderPlanItems(items) {
    var html = '';
    items.forEach(function(item) {
        var nd = item.note || '<span class="text-muted">—</span>', sd = item.schedule || '<span class="text-muted">—</span>';
        html += '<tr style="cursor:pointer;" onclick="selectPlanRow(this)" data-item="' + encodeURIComponent(JSON.stringify(item)) + '">';
        html += '<td><input type="radio" name="planSelect" style="pointer-events:none;"></td>';
        html += '<td><strong>' + item.planName + '</strong><br><span class="text-xs text-muted">' + item.planId + '</span></td>';
        html += '<td>' + item.content + '</td>';
        html += '<td>' + renderCategoryTag(item.cat) + '</td>';
        html += '<td><span class="tag tag-blue">' + item.method + '</span></td>';
        html += '<td class="text-sm">' + nd + '</td>';
        html += '<td><span class="money">¥' + (item.amount * 10000).toFixed(2) + '元</span><br><span class="text-xs text-muted">限价：¥' + (item.limit * 10000).toFixed(2) + '元</span></td>';
        html += '<td class="text-sm">' + sd + '</td>';
        html += '</tr>';
    });
    document.getElementById('planItemTableBody').innerHTML = html || '<tr><td colspan="8" class="text-muted text-sm" style="text-align:center;padding:20px;">无匹配的可用招采项</td></tr>';
}

function applyPagination() {
    var all = getFilteredAndSorted();
    document.getElementById('planItemCount').textContent = getAvailableItems().length;
    var tp = Math.ceil(all.length / PAGE_SIZE) || 1;
    if (currentPage > tp) currentPage = tp;
    var start = (currentPage - 1) * PAGE_SIZE;
    renderPlanItems(all.slice(start, start + PAGE_SIZE));
    document.getElementById('pageInfo').textContent = '第 ' + currentPage + '/' + tp + ' 页（共 ' + all.length + ' 条）';
    document.getElementById('prevPageBtn').disabled = currentPage <= 1;
    document.getElementById('nextPageBtn').disabled = currentPage >= tp;
}

function filterPlanItems() { currentPage = 1; selectedItem = null; document.getElementById('btnNextStep').disabled = true; applyPagination(); }
function prevPage() { if (currentPage > 1) { currentPage--; applyPagination(); } }
function nextPage() { var all = getFilteredAndSorted(); var tp = Math.ceil(all.length / PAGE_SIZE) || 1; if (currentPage < tp) { currentPage++; applyPagination(); } }
function sortPlanItems(field) { if (sortState.field === field) { sortState.asc = !sortState.asc; } else { sortState.field = field; sortState.asc = true; } ['planName','content','note','amount','schedule'].forEach(function(f) { var icon = document.getElementById('sortIcon-' + f); if (icon) { if (f === field) icon.textContent = sortState.asc ? '↑' : '↓'; else icon.textContent = '↕'; } }); filterPlanItems(); }
function showStep1() { document.getElementById('step1Content').style.display = ''; document.getElementById('step2Content').style.display = 'none'; document.getElementById('stepNode1').classList.add('active'); document.getElementById('stepNode1').classList.remove('done'); document.getElementById('stepNode2').classList.remove('active', 'done'); document.getElementById('btnNextStep').disabled = true; filterPlanItems(); }
(function init() { showStep1(); })();
function resetStep1Filter() { document.getElementById('searchPlanId').value = ''; document.getElementById('searchContent').value = ''; document.getElementById('thFilterCat').value = 'all'; document.getElementById('thFilterMethod').value = 'all'; sortState.field = ''; sortState.asc = true; ['planName','content','note','amount','schedule'].forEach(function(f) { var icon = document.getElementById('sortIcon-' + f); if (icon) icon.textContent = '↕'; }); filterPlanItems(); }
function selectPlanRow(row) { document.querySelectorAll('#planItemTableBody tr').forEach(function(r) { r.classList.remove('selected'); }); row.classList.add('selected'); row.querySelector('input[type="radio"]').checked = true; selectedItem = JSON.parse(decodeURIComponent(row.getAttribute('data-item'))); document.getElementById('btnNextStep').disabled = false; }

function goToStep2() {
    if (!selectedItem) return;
    document.getElementById('step1Content').style.display = 'none'; document.getElementById('step2Content').style.display = '';
    document.getElementById('stepNode1').classList.remove('active'); document.getElementById('stepNode1').classList.add('done'); document.getElementById('stepNode2').classList.add('active');
    document.getElementById('s2PlanNo').value = selectedItem.planId + ' · ' + selectedItem.planName;
    document.getElementById('s2Unit').value = selectedItem.unit;
    document.getElementById('s2ProjectName').value = selectedItem.content;
    document.getElementById('s2ProcContent').value = selectedItem.content;
    document.getElementById('s2ProcMethod').value = selectedItem.method;
    var parent = extractParentCategory(selectedItem.cat), sub = extractSubCategory(selectedItem.cat);
    populateStep2Category(parent, sub);
    step2Limit = selectedItem.limit * 10000;
    var defaultAmount = Math.min(selectedItem.amount * 10000, step2Limit);
    document.getElementById('s2ProcAmount').value = defaultAmount.toFixed(2);
    document.getElementById('s2LimitMax').textContent = step2Limit.toFixed(2);
    document.getElementById('s2ProcAmount').classList.remove('limit-exceeded');
    document.getElementById('step2SelectedInfo').textContent = selectedItem.planId + ' · ' + selectedItem.content + '（' + selectedItem.method + '）';
    renderStep2MethodHints(parent, selectedItem.method);
    if (selectedItem.method === '直接采购') { initStep2DirectPurchase(); } else { document.getElementById('s2DirectPurchaseSection').style.display = 'none'; document.getElementById('s2DpReasonFileGroup').style.display = 'none'; document.getElementById('s2DpFlowHint').style.display = 'none'; document.getElementById('s2NormalFlowHint').style.display = ''; }
    document.getElementById('s2BidIssueDate').value = ''; document.getElementById('s2BidOpenDate').value = ''; document.getElementById('s2BidAwardDate').value = ''; document.getElementById('s2AnnounceDate').value = ''; document.getElementById('s2Description').value = '';
}

function populateStep2Category(parent, sub) {
    var parentEl = document.getElementById('s2CatParent'), childEl = document.getElementById('s2CatSub');
    parentEl.innerHTML = '<option value="' + parent + '" selected>' + parent + '</option>';
    var subs = CATEGORY_TREE[parent] || [];
    childEl.innerHTML = '<option value="">—</option>';
    subs.forEach(function(s) { childEl.innerHTML += '<option value="' + s + '"' + (s === sub ? ' selected' : '') + '>' + s + '</option>'; });
}

function renderStep2MethodHints(category, selectedMethod) {
    var amt = parseFloat(document.getElementById('s2ProcAmount').value) || 0;
    var recs = recommendProcurementMethod(category || '', amt), html = '';
    for (var i = 0; i < recs.length; i++) { var r = recs[i], isSel = (r.method === selectedMethod); html += '<div class="method-hint ' + (isSel ? 'method-hint-best' : (r.compliant ? 'method-hint-ok' : 'method-hint-warn')) + '" style="' + (isSel ? 'font-weight:600;' : '') + '">' + (isSel ? '👉 ' : '') + r.tag + ' — ' + r.reason + '</div>'; }
    document.getElementById('s2MethodHints').innerHTML = html;
}

function initStep2DirectPurchase() {
    var section = document.getElementById('s2DirectPurchaseSection'), body = document.getElementById('s2DpConditionsBody');
    section.style.display = ''; var html = '';
    DIRECT_PURCHASE_CONDITIONS.forEach(function(c) { html += '<label style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;cursor:pointer;"><input type="radio" name="s2DpCond" value="' + c.id + '"' + (c.id === 'D1' ? ' checked' : '') + ' style="margin-top:3px;" onchange="onStep2DpChange()"><div><strong>' + c.label + '</strong><br><span class="text-xs text-muted">' + c.desc + '</span></div></label>'; });
    body.innerHTML = html; onStep2DpChange();
}

function onStep2DpChange() {
    var checked = document.querySelector('input[name="s2DpCond"]:checked');
    if (!checked) return;
    var isD1 = (checked.value === 'D1');
    document.getElementById('s2DpReasonFileGroup').style.display = isD1 ? 'none' : '';
    document.getElementById('s2NormalFlowHint').style.display = 'none';
    var hint = document.getElementById('s2DpFlowHint'); hint.style.display = '';
    if (isD1) { hint.innerHTML = '✅ <strong>流程合并说明：</strong>合同估算价＜100,000.00元，采购申请与确定采购结果合并，审批通过后可直接填写采购结果。'; document.getElementById('btnConfirm').textContent = '提交审批并进入采购结果'; }
    else { hint.innerHTML = '📌 <strong>流程分开说明：</strong>该情形下采购申请审批通过后，需单独提交确定采购结果流程。'; document.getElementById('btnConfirm').textContent = '确认'; }
}

function validateStep2Limit() {
    var input = document.getElementById('s2ProcAmount'), val = parseFloat(input.value);
    if (!isNaN(val) && val > step2Limit) { input.classList.add('limit-exceeded'); document.getElementById('s2LimitHint').innerHTML = '<span style="color:var(--danger);">⚠ 超出计划限价（≤' + step2Limit.toFixed(2) + ' 元）</span>'; }
    else { input.classList.remove('limit-exceeded'); document.getElementById('s2LimitHint').innerHTML = '计划上限：<span>' + step2Limit.toFixed(2) + '</span> 元'; }
    renderStep2MethodHints(extractParentCategory(selectedItem.cat), document.getElementById('s2ProcMethod').value);
}

function goBackToStep1() { showStep1(); }

function confirmProcurement() {
    var limitVal = parseFloat(document.getElementById('s2ProcAmount').value);
    if (limitVal > step2Limit) { showAlert('⚠️ 采购金额超出计划限价，请调整后提交。'); return; }
    var method = document.getElementById('s2ProcMethod').value;
    if (method === '直接采购') {
        var checked = document.querySelector('input[name="s2DpCond"]:checked');
        if (!checked) { showAlert('⚠️ 请选择直接采购原因。'); return; }
        var isD1 = (checked.value === 'D1');
        if (!isD1) { var fi = document.getElementById('s2DpReasonFile'); if (fi && !fi.files.length) { showAlert('⚠️ 请上传直接采购原因说明文件。'); return; } }
        showAlert(isD1 ? '✅ 采购申请已提交，请进入采购结果填写页面。' : '✅ 采购申请已提交，审批通过后请单独提交确定采购结果。');
    } else { showAlert('✅ 采购申请已提交，进入OA审批流程。'); }
    var refMap = {};
    try { refMap = JSON.parse(sessionStorage.getItem('planItemRefStatus') || '{}'); } catch(e) {}
    refMap[selectedItem.id] = '已引用';
    sessionStorage.setItem('planItemRefStatus', JSON.stringify(refMap));
    sessionStorage.setItem('procurementViewContext', JSON.stringify({ method: selectedItem.method, projectName: selectedItem.content, amount: '¥' + (selectedItem.amount * 10000).toFixed(2) + '元', unit: selectedItem.unit, plan: selectedItem.planId + ' · ' + selectedItem.planName, handler: selectedItem.handler, status: '进行中', currentStep: 0, doneCount: 0 }));
    navTo('procurement', 'procurement/view.html');
}
</script>
</body>
</html>
