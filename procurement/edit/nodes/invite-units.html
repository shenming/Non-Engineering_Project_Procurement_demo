<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../common/styles.css">
<style>
    .attach-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .attach-table th { text-align: left; padding: 6px 8px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); font-size: 11px; white-space: nowrap; }
    .attach-table td { padding: 6px 8px; border-bottom: 1px solid var(--gray-100); font-size: 11px; }
    .attach-table .op-icon { cursor: pointer; color: var(--primary); font-size: 14px; margin: 0 2px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body class="content-page" style="padding:0;">
<div class="card" style="margin:0;border:none;box-shadow:none;">
    <div class="card-header"><h3>📨 拟邀请单位信息 </h3></div>
    <div class="card-body">
        <div class="form-group" style="margin-bottom:12px;">
            <label>拟邀请单位情况说明 <span class="required">*</span></label>
            <textarea class="form-control" data-field="inviteNote" id="inviteDesc" rows="4" placeholder="请填写拟邀请单位情况说明" style="resize:vertical;"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label>审批状态</label>
            <div><span class="tag tag-green">审批通过</span></div>
        </div>
        <div class="flex-between mb-8" style="margin-top:20px;border-top:1px solid var(--gray-200);padding-top:16px;">
            <div class="text-sm fw-600">📎 附件管理</div>
            <div class="flex gap-8">
                <button class="btn btn-sm btn-outline" onclick="createAttachRow()">创建</button>
                <button class="btn btn-sm btn-danger" onclick="batchDeleteAttach()">删除</button>
            </div>
        </div>
        <div class="table-wrap">
            <table class="attach-table">
                <thead><tr><th style="width:30px;"><input type="checkbox" onclick="toggleAllAttach(this)"></th><th style="width:100px;">操作</th><th>附件类型</th><th>附件文档名称</th><th>组件名称</th><th style="width:40px;">预览</th><th>文件类型</th><th>文件大小（字节）</th><th>时戳编码</th><th>文件上传时间</th><th>上传操作用户名</th></tr></thead>
                <tbody id="attachBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="../../../common/scripts.js"></script>
<script>
(function(){function g(){var p={};location.search.replace('?','').split('&').forEach(function(s){var kv=s.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'')});return p}var a=g(),m=a.method||'公开招标',s=parseInt(a.step)||0,d=JSON.parse(sessionStorage.getItem('procNodeData')||'{}');if(!d||!d[m]||!d[m].nodes||!d[m].nodes[s])return;var n=d[m].nodes[s],f=n.form||{};if(f.inviteNote)document.getElementById('inviteDesc').value=f.inviteNote})();
function createAttachRow(){var tbody=document.getElementById('attachBody'),tr=document.createElement('tr');tr.setAttribute('data-id','a'+Date.now());tr.innerHTML='<td><input type="checkbox" class="attach-cb"></td><td><span class="op-icon" onclick="alert(\'📤 上传\')">📤</span><span class="op-icon" onclick="deleteAttachRow(this)">🗑</span><span class="op-icon" onclick="alert(\'⬇️ 下载\')">⬇</span><span class="op-icon" onclick="alert(\'👁️ 预览\')">👁</span></td><td contenteditable="true">新附件</td><td contenteditable="true"></td><td contenteditable="true">拟邀请单位</td><td><span class="op-icon" onclick="alert(\'👁️ 预览文件\')">👁</span></td><td contenteditable="true">pdf</td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true">'+new Date().toISOString().replace('T',' ').substring(0,19)+'</td><td contenteditable="true">当前用户</td>';tbody.appendChild(tr)}
function deleteAttachRow(icon){var row=icon.closest('tr');if(row)row.remove()}
function batchDeleteAttach(){var cbs=document.querySelectorAll('.attach-cb:checked');if(cbs.length===0){alert('⚠️ 请先勾选要删除的附件行。');return}if(confirm('确认删除选中的 '+cbs.length+' 条附件？')){cbs.forEach(function(cb){var row=cb.closest('tr');if(row)row.remove()})}}
function toggleAllAttach(checkbox){document.querySelectorAll('.attach-cb').forEach(function(cb){cb.checked=checkbox.checked})}
</script>
</body>
</html>
