function renderSectionRows(sections, purchaseIdx) {
    var shtml = '';
    sections.forEach(function(s, si) {

        shtml += '<td><input type="radio" name="sectionSelect" onchange="onSectionSelect(this)"' + checked + '></td>';

        shtml += '<td>' + s.name + '</td>';

        shtml += '<td>' + s.target + '</td>';

        shtml += '</tr>';
    });
    return shtml;
}
