<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../common/styles.css">
<style>
body.content-page { padding: 16px; }
.info-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.info-card .card-header { padding: 12px 16px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); }
.info-card .card-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
.info-card .card-body { padding: 16px; }
.info-card .card-body textarea { width: 100%; min-height: 60px; padding: 8px 10px; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 13px; background: var(--gray-50); color: var(--gray-600); resize: none; }
.info-row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.info-row .info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.info-row .info-item .label { color: var(--gray-500); white-space: nowrap; }
.page-main-title { font-size: 18px; font-weight: 700; color: var(--gray-800); margin-bottom: 12px; }
.sub-table-wrap { overflow-x: auto; }
.supplier-expand { margin-left: 4px; color: var(--primary-light); cursor: pointer; font-size: 12px; text-decoration: underline; }
.action-btn-group .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: 1px solid var(--gray-300); border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; color: var(--gray-600); }
.action-btn-group .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.attach-empty { text-align: center; padding: 24px 16px; color: var(--gray-400); font-size: 13px; }
.supplier-modal-overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.4); display:flex;align-items:center;justify-content:center;z-index:1000; }
.supplier-modal { background:#fff; border-radius:8px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
.supplier-modal .modal-header { padding:16px 20px; border-bottom:1px solid var(--gray-200); font-size:15px; font-weight:600; display:flex; justify-content:space-between; }
.supplier-modal .modal-body { padding:16px 20px; }
.supplier-modal .modal-footer { padding:12px 20px; border-top:1px solid var(--gray-200); text-align:right; }
.supply-tbl { width:100%; border-collapse:collapse; font-size:12px; }
.supply-tbl th { text-align:left; padding:6px 8px; background:var(--gray-50); border-bottom:1px solid var(--gray-200); }
.supply-tbl td { padding:4px 8px; border-bottom:1px solid var(--gray-100); }
.supply-tbl input { width:100%; box-sizing:border-box; padding:4px 6px; border:1px solid var(--gray-300); border-radius:3px; font-size:12px; }
</style>
</head>
<body class="content-page">
<div class="page-main-title" id="pageMainTitle">定标结果</div>
<div class="info-card" id="cardRoot">
  <div class="card-header"><h3>📋 定标基本信息</h3></div>
  <div class="card-body">
    <div class="info-row" style="margin-bottom:12px;">
      <div class="info-item"><span class="label">审批状态：</span><span id="statusTag" class="tag tag-yellow">审批中</span></div>
      <div class="info-item"><span class="label">招采申请编号：</span><span id="spanApplyCode" style="font-weight:600;"></span></div>
      <div class="info-item"><span class="label">所属单位：</span><span id="spanUnit"></span></div>
    </div>
    <div>
      <div class="label" style="font-size:13px;color:var(--gray-500);margin-bottom:4px;">定标结果信息说明：</div>
      <textarea data-field="resultNote" id="resultNote" readonly></textarea>
    </div>
  </div>
</div>
<div class="info-card">
  <div class="card-header"><h3>📦 定标标段明细</h3></div>
  <div class="card-body" style="padding:0;">
    <div class="sub-table-wrap">
      <table><thead><tr><th style="width:36px;"></th><th>招采计划编号</th><th>行号</th><th>招采目标</th><th>定标编号</th><th>招标采购名称</th><th>标段号</th><th>招采限额(元)</th><th>中标金额(元)</th><th>中标单位编号</th><th>中标单位名称</th><th>中标日期</th><th>其他供应商</th></tr></thead>
        <tbody id="sectionBody"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="info-card">
  <div class="card-header"><h3>📎 附件管理</h3></div>
  <div class="card-body" style="padding:0;">
    <div class="sub-table-wrap">
      <table><thead><tr><th style="width:120px;">操作</th><th>附件类型</th><th>附件文档名称</th><th>组件名称</th><th>文件 ID</th><th>文件类型</th><th>文件大小(字节)</th><th>时戳</th><th>用户名</th></tr></thead>
        <tbody id="attachBody"></tbody>
      </table>
    </div>
    <div id="attachEmpty" class="attach-empty">请在定标标段明细中选择一条记录查看附件</div>
  </div>
</div>
<script src="../../../common/scripts.js"></script>
<script>
    // ===== 编辑模式：页面级控制，可编辑时显示附件工具栏 =====
    (function() {
        var p = {}; location.search.replace('?','').split('&').forEach(function(s){var kv=s.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'')});
        if (p.mode !== 'edit') return;
        var m = p.method || '公开招标', st = parseInt(p.step) || 0;
        try { var es = JSON.parse(sessionStorage.getItem('editEditableSteps') || '{}'); } catch(e) {}
        if (!es || !es[m] || es[m][st] !== true) return;
        var tb = document.getElementById('attachBody');
        if (tb) {
            var wrap = tb.closest('.table-wrap') || tb.parentNode;
            if (wrap && !wrap.querySelector('.attach-toolbar')) {
                var bar = document.createElement('div');
                bar.className = 'attach-toolbar';
                bar.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;';
                bar.innerHTML = '<button class="btn btn-xs btn-outline" onclick="createAttachRow()">＋ 创建</button>'
                    + '<button class="btn btn-xs btn-danger" onclick="batchDeleteAttach()">🗑 批量删除</button>';
                wrap.parentNode.insertBefore(bar, wrap);
            }
        }
        window.createAttachRow = window.createAttachRow || function() {
            var tb = document.getElementById('attachBody');
            if (!tb) return;
            var tr = document.createElement('tr');
            tr.innerHTML = '<td><input type="checkbox" class="attach-cb"></td>'
                + '<td><span class="op-icon" onclick="if(confirm(\'确认删除？\'))this.closest(\'tr\').remove()">🗑</span></td>'
                + '<td contenteditable="true">新附件</td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true">' + new Date().toISOString().replace('T',' ').substring(0,19) + '</td>'
                + '<td contenteditable="true">当前用户</td>';
            tb.appendChild(tr);
        };
        window.batchDeleteAttach = window.batchDeleteAttach || function() {
            var cbs = document.querySelectorAll('.attach-cb:checked');
            if (cbs.length === 0) { alert('⚠️ 请先勾选要删除的附件行'); return; }
            if (confirm('确认删除选中的 ' + cbs.length + ' 条附件？')) {
                cbs.forEach(function(cb) { var r = cb.closest('tr'); if (r) r.remove(); });
            }
        };
    })();
</script>
<script>
(function(){
    function g(){var p={};location.search.replace('?','').split('&').forEach(function(s){var kv=s.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'')});return p}
    var a=g(),m=a.method||'公开招标',s=parseInt(a.step)||0,d=JSON.parse(sessionStorage.getItem('procNodeData')||'{}');
    if(!d||!d[m]){document.getElementById('cardRoot').innerHTML='<div class="card-body"><p class="text-muted">暂无数据</p></div>';return}
    var nd=d[m].nodes[s],f=nd.form||{};
    if(d[m].info&&d[m].info.projectName) document.getElementById('pageMainTitle').textContent=d[m].info.projectName+' 定标结果';
    document.getElementById('spanApplyCode').textContent=f.applyCode||'';
    document.getElementById('spanUnit').textContent=f.unit||'';
    document.getElementById('resultNote').value=f.resultNote||'';
    var st=document.getElementById('statusTag'),sv=f.approvalStatus||'审批中';
    st.textContent=sv;st.className='tag '+(sv==='审批通过'?'tag-green':sv==='审批中'?'tag-yellow':'tag-gray');
    var _editable = (a.mode==='edit');
    try{var _es=JSON.parse(sessionStorage.getItem('editEditableSteps')||'{}');_editable=_editable&&_es&&_es[m]&&_es[m][s]===true;}catch(e){_editable=false;}
    // 客商库
    var SUPPLIER_MAP={
        'GYS-001':'北京金牌物业服务有限公司','GYS-010':'上海华讯网络系统有限公司','GYS-011':'北京神州数码有限公司',
        'GYS-012':'深圳华为技术有限公司','GYS-015':'杭州海康威视数字技术股份有限公司','GYS-016':'浙江大华技术股份有限公司',
        'GYS-018':'北京浪潮电子信息产业有限公司','GYS-019':'联想（北京）信息技术有限公司','GYS-020':'中科曙光信息产业股份有限公司',
        'GYS-022':'新华三技术有限公司','GYS-023':'锐捷网络股份有限公司','GYS-030':'上海安保通智能科技有限公司',
        'GYS-031':'北京中科弱电工程有限公司','GYS-032':'深圳达实智能股份有限公司','GYS-040':'北京XX律师事务所',
        'GYS-050':'上海晨光办公用品有限公司','GYS-051':'北京齐心办公用品有限公司'
    };
    var secs=nd.sections||[],stb=document.getElementById('sectionBody'),sh='';
    window._awardSecs=secs;
    for(var i=0;i<secs.length;i++){
        var sc=secs[i];
        var limitTd='<span class="money">¥'+(sc.limitAmount||0).toLocaleString()+'</span>';
        var winAmtTd=_editable?'<input type="number" class="form-control" style="width:90px;height:28px;font-size:12px;" value="'+(sc.winAmount||0)+'" onchange="window._awardSecs['+i+'].winAmount=parseFloat(this.value)||0">':'<span class="money">'+(sc.winAmount||0).toLocaleString()+'</span>';
        var supCodeTd=_editable?'<input class="form-control" style="width:80px;height:28px;font-size:12px;" value="'+(sc.supplierCode||'')+'" onchange="var n=SUPPLIER_MAP[this.value.trim()];if(n){window._awardSecs['+i+'].supplierName=n;var r=this.closest(\'tr\');if(r&&r.cells[11])r.cells[11].textContent=n;}window._awardSecs['+i+'].supplierCode=this.value.trim();">':(sc.supplierCode||'');
        var supNameTd=_editable?'<input class="form-control" style="width:100px;height:28px;font-size:12px;" value="'+(sc.supplierName||'')+'" onchange="window._awardSecs['+i+'].supplierName=this.value">':(sc.supplierName||'');
        var winDateTd=_editable?'<input type="date" class="form-control" style="width:110px;height:28px;font-size:12px;" value="'+(sc.winDate||'')+'" onchange="window._awardSecs['+i+'].winDate=this.value">':(sc.winDate||'');
        var otherSupTd=_editable?'<button class="btn btn-xs btn-outline" onclick="event.stopPropagation();openSupModal('+i+')">管理</button>':'<span class="supplier-expand" onclick="event.stopPropagation();alert(\''+(sc.otherSuppliers?sc.otherSuppliers.map(function(x){return x.code+' - '+x.name}).join('\\n'):'无')+'\')">展开</span>';
        sh+='<tr data-sid="'+sc.id+'" style="cursor:pointer;" onclick="selectSection(this)"><td style="text-align:center;"><input type="radio" name="sRad" style="pointer-events:none;"'+(i===0?' checked':'')+'></td><td>'+sc.planCode+'</td><td>'+sc.lineNo+'</td><td><strong>'+sc.target+'</strong></td><td>'+sc.awardCode+'</td><td>'+sc.purchaseName+'</td><td>'+sc.sectionNo+'</td><td>'+limitTd+'</td><td>'+winAmtTd+'</td><td>'+supCodeTd+'</td><td>'+supNameTd+'</td><td>'+winDateTd+'</td><td>'+otherSupTd+'</td></tr>';
    }
    stb.innerHTML=sh;
    // 其他供应商管理弹窗
    window.openSupModal=function(idx){
        if(!secs[idx])return;
        var data=secs[idx].otherSuppliers||[];
        var overlay=document.createElement('div');
        overlay.className='supplier-modal-overlay';
        overlay.innerHTML='<div class="supplier-modal"><div class="modal-header"><span>管理其他供应商</span><button class="btn btn-xs" onclick="this.closest(\'.supplier-modal-overlay\').remove()">✕</button></div>'
            +'<div class="modal-body"><table class="supply-tbl"><thead><tr><th>单位编号</th><th>单位名称</th><th style="width:50px;"></th></tr></thead><tbody id="supTbody"></tbody></table>'
            +'<button class="btn btn-xs btn-outline" style="margin-top:8px;" onclick="addSupRow()">＋ 新增</button></div>'
            +'<div class="modal-footer"><button class="btn btn-sm btn-outline" onclick="saveSup('+idx+')">确认</button></div></div>';
        document.body.appendChild(overlay);
        window._supData=data.slice();
        renderSupTbl();
    };
    window.renderSupTbl=function(){
        var tb=document.getElementById('supTbody');if(!tb)return;
        var h='';
        for(var i=0;i<_supData.length;i++){
            h+='<tr><td><input value="'+(_supData[i].code||'')+'" onchange="_supData['+i+'].code=this.value"></td>'
                +'<td><input value="'+(_supData[i].name||'')+'" onchange="_supData['+i+'].name=this.value"></td>'
                +'<td><button class="btn btn-xs btn-danger" onclick="_supData.splice('+i+',1);renderSupTbl()">🗑</button></td></tr>';
        }
        tb.innerHTML=h;
    };
    window.addSupRow=function(){_supData.push({code:'',name:''});renderSupTbl();};
    window.saveSup=function(idx){
        if(secs[idx])secs[idx].otherSuppliers=_supData;
        document.querySelector('.supplier-modal-overlay').remove();
    };
    // 附件
    var ats=nd.attachments||{},tb=document.getElementById('attachBody'),ee=document.getElementById('attachEmpty');
    var _d=_editable?'':' disabled';
    var allAtts=[];
    if(Array.isArray(ats)){allAtts=ats;
    }else if(typeof ats==='object'&&ats!==null){
        for(var _k in ats){if(ats.hasOwnProperty(_k)&&Array.isArray(ats[_k])){allAtts=allAtts.concat(ats[_k]);}}
    }
    var ah='';
    for(var i=0;i<allAtts.length;i++){var o=allAtts[i];
        ah+='<tr><td><span class="op-icon'+_d+'">📤</span><span class="op-icon'+_d+'">🗑</span><span class="op-icon" onclick="alert(\'👁️ 预览\')">👁</span><span class="op-icon" onclick="alert(\'📥 下载\')">📥</span></td><td>'+(o.type||'')+'</td><td>'+(o.name||'')+'</td><td>'+(o.comp||'')+'</td><td style="font-family:monospace;font-size:10px;">'+(o.fileId||'')+'</td><td>'+(o.fileType||'')+'</td><td style="text-align:right;">'+(o.size||'')+'</td><td>'+(o.ts||'')+'</td><td>'+(o.user||'')+'</td></tr>';
    }
    tb.innerHTML=ah||'<tr><td colspan="9" class="text-muted" style="text-align:center;padding:16px;">无附件</td></tr>';
    if(ee)ee.style.display='none';
    window.selectSection=function(row){
        document.querySelectorAll('#sectionBody tr').forEach(function(r){r.classList.remove('selected')});
        row.classList.add('selected');row.querySelector('input[type="radio"]').checked=true;
    };
    if(_editable){
        document.querySelectorAll('input,select,textarea').forEach(function(el){el.disabled=false;el.readOnly=false;el.style.background='';el.style.color='';el.style.cursor='';});
        document.querySelectorAll('.op-icon').forEach(function(el){el.classList.remove('disabled');});
    }
})();
</script>
<script>
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'editData') {
            var pd = JSON.parse(sessionStorage.getItem('procNodeData') || '{}');
            if (!pd || Object.keys(pd).length === 0) {
                try { sessionStorage.setItem('procNodeData', JSON.stringify(e.data.procNodeData)); } catch(e2) {}
            }
            var es = JSON.parse(sessionStorage.getItem('editEditableSteps') || '{}');
            if (!es || Object.keys(es).length === 0) {
                try { sessionStorage.setItem('editEditableSteps', JSON.stringify(e.data.editEditableSteps)); } catch(e2) {}
            }
            if (typeof window.reloadNodeData === 'function') window.reloadNodeData();
            else if (typeof location !== 'undefined') location.reload();
        }
    });
</script>
</body>
</html>
