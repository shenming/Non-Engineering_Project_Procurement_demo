<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../common/styles.css">
<style>
    .two-col { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
    .attach-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .attach-table th { text-align: left; padding: 6px 8px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); font-size: 11px; white-space: nowrap; }
    .attach-table td { padding: 6px 8px; border-bottom: 1px solid var(--gray-100); font-size: 11px; }
    .attach-table .op-icon { cursor: pointer; color: var(--primary); font-size: 14px; margin: 0 2px; }
    .attach-table .op-icon.disabled { color: var(--gray-400); cursor: not-allowed; pointer-events: none; }
    .form-control[readonly], .form-control:disabled { background: var(--gray-50); color: var(--gray-600); cursor: not-allowed; }
</style>
</head>
<body class="content-page" style="padding:0;">

<div class="card" style="margin:0;border:none;box-shadow:none;" id="cardRoot">
    <div class="card-header"><h3 id="nodeTitle">🔓 开标信息</h3></div>
    <div class="card-body">
        <div class="two-col">
            <div>
                <div class="form-group" style="margin-bottom:12px;">
                    <label>开标信息情况说明</label>
                    <textarea class="form-control" data-field="desc" id="txtDesc" rows="4" readonly style="background:var(--gray-50);color:var(--gray-600);cursor:not-allowed;"></textarea>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>审批状态</label>
                    <div><span class="tag tag-green">审批通过</span></div>
                </div>
            </div>
            <div>
                <div class="form-group">
                    <label>投标单位数量</label>
                    <input class="form-control" type="number" data-field="bidderCount" id="txtBidderCount" disabled style="font-size:18px;font-weight:700;text-align:center;">
                </div>
                <div class="alert alert-info" style="margin-top:12px;">
                    <span>📌</span>
                    <div>当前已录入 <strong id="bidderCountDisplay">0</strong> 家投标单位</div>
                </div>
            </div>
        </div>

        <div class="text-sm fw-600" style="margin-top:20px;border-top:1px solid var(--gray-200);padding-top:16px;margin-bottom:8px;">📎 附件管理</div>
        <div class="table-wrap">
            <table class="attach-table">
                <thead>
                    <tr>
                        <th style="width:120px;">操作</th>
                        <th>附件类型</th>
                        <th>附件文档名称</th>
                        <th>组件名称</th>
                        <th>文件类型</th>
                        <th>文件大小（字节）</th>
                        <th>时戳编码</th>
                        <th>文件上传时间</th>
                        <th>上传操作用户名</th>
                    </tr>
                </thead>
                <tbody id="attachBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../../../common/scripts.js"></script>
<script>
(function initNode() {
    function getParams() { var p={};location.search.replace('?','').split('&').forEach(function(s){var kv=s.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'')});return p; }
    var params = getParams();
    var method = params.method || '公开招标';
    var step = parseInt(params.step) || 0;
    var pd = JSON.parse(sessionStorage.getItem('procNodeData')||'{}');
    if (!pd || !pd[method] || !pd[method].nodes || !pd[method].nodes[step]) { document.getElementById('cardRoot').innerHTML = '<div class="card-body"><p class="text-muted">暂无数据</p></div>'; return; }
    var nd = pd[method].nodes[step];
    var f = nd.form || {};

    document.getElementById('txtDesc').value = f.desc || '';
    document.getElementById('txtBidderCount').value = f.bidderCount || 0;
    document.getElementById('bidderCountDisplay').textContent = f.bidderCount || 0;var st=document.getElementById('statusTag'),sv=f.approvalStatus||'审批通过';if(st){st.textContent=sv;st.className='tag '+(sv==='审批通过'||sv==='已生效'?'tag-green':sv.indexOf('中')>=0?'tag-yellow':'tag-gray')}

    var tbody = document.getElementById('attachBody');
    var atts = nd.attachments || [];
    var html = '';
    for (var i = 0; i < atts.length; i++) {
        var a = atts[i];
        html += '<tr>';
        html += '<td><span class="op-icon disabled">📤</span><span class="op-icon disabled">🗑️</span><span class="op-icon" onclick="alert(\'👁️ 预览\')">👁️</span><span class="op-icon" onclick="alert(\'⬇️ 下载\')">⬇️</span></td>';
        html += '<td>' + (a.type||'') + '</td>';
        html += '<td>' + (a.name||'') + '</td>';
        html += '<td>' + (a.comp||'') + '</td>';
        html += '<td>' + (a.fileType||'') + '</td>';
        html += '<td style="text-align:right;">' + (a.size||'') + '</td>';
        html += '<td>' + (a.ts||'') + '</td>';
        html += '<td>' + (a.time||'') + '</td>';
        html += '<td>' + (a.user||'') + '</td>';
        html += '</tr>';
    }
    tbody.innerHTML = html || '<tr><td colspan="9" class="text-muted" style="text-align:center;padding:16px;">无附件</td></tr>';

    // ===== 编辑模式：解锁可编辑字段 =====
    if (params.mode === 'edit') {
        try { var locked = JSON.parse(sessionStorage.getItem('editLockedFields') || '{}'); } catch(e) {}
        if (locked) {
            var lockedNames = (locked[method] && locked[method][step]) || [];
            document.querySelectorAll('input,select,textarea').forEach(function(el) {
                var field = el.getAttribute('data-field') || '';
                if (lockedNames.indexOf(field) !== -1) return;
                if (el.tagName === 'SELECT') el.disabled = false;
                else el.readOnly = false;
                el.style.background = '';
                el.style.color = '';
                el.style.cursor = '';
            });
            document.querySelectorAll('.op-icon').forEach(function(el) { el.classList.remove('disabled'); });
        }
    }
})();
</script>
</body>
</html>
