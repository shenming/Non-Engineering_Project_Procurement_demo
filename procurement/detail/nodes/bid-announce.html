<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../common/styles.css">
<style>
body.content-page { padding: 16px; }
.info-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.info-card .card-header { padding: 12px 16px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); }
.info-card .card-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
.info-card .card-body { padding: 16px; }
.form-control[readonly], .form-control:disabled { background: var(--gray-50); color: var(--gray-600); cursor: not-allowed; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 4px; }
.form-group:last-child { margin-bottom: 0; }
.attach-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.attach-table th { text-align: left; padding: 6px 8px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); font-size: 11px; white-space: nowrap; }
.attach-table td { padding: 6px 8px; border-bottom: 1px solid var(--gray-100); font-size: 11px; }
.op-icon { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border: 1px solid var(--gray-300); border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; color: var(--gray-600); transition: var(--transition); }
.op-icon:hover:not(:disabled) { background: var(--gray-50); border-color: var(--gray-400); }
.op-icon:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body class="content-page">
<div class="info-card" id="cardRoot">
  <div class="card-header"><h3>📢 招采公告基本信息</h3></div>
  <div class="card-body" id="formBody">
    <div class="form-group">
      <label>招采公告对外披露名称</label>
      <input class="form-control" data-field="announceName" id="txtAnnounceName" readonly>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>开始报名日期</label>
        <input type="date" class="form-control" data-field="startDate" id="txtStartDate" disabled>
      </div>
      <div class="form-group">
        <label>截止报名日期</label>
        <input type="date" class="form-control" data-field="endDate" id="txtEndDate" disabled>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>审批状态</label>
      <div><span id="statusTag" class="tag tag-green">审批通过</span></div>
    </div>
  </div>
</div>
<div class="info-card">
  <div class="card-header"><h3>📎 附件管理</h3></div>
  <div class="card-body" style="padding:0;">
    <div class="table-wrap">
      <table class="attach-table">
        <thead><tr><th style="width:30px;"><input type="checkbox" disabled></th><th style="width:130px;">操作</th><th>附件类型</th><th>附件文档名称（预览）</th><th>文件名（下载）</th><th>文件 ID</th><th>文件类型</th><th>文件大小(字节)</th><th>时戳</th><th>用户名</th></tr></thead>
        <tbody id="attachBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="../../../common/scripts.js"></script>
<script>
(function(){function g(){var p={};location.search.replace('?','').split('&').forEach(function(s){var kv=s.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'')});return p}var a=g(),m=a.method||'公开招标',s=parseInt(a.step)||0,d=JSON.parse(sessionStorage.getItem('procNodeData')||'{}');if(!d||!d[m]||!d[m].nodes||!d[m].nodes[s]){document.getElementById('cardRoot').innerHTML='<div class="card-body"><p class="text-muted">暂无数据</p></div>';return}var n=d[m].nodes[s],f=n.form||{};document.getElementById('txtAnnounceName').value=f.announceName||'';document.getElementById('txtStartDate').value=f.startDate||'';document.getElementById('txtEndDate').value=f.endDate||'';var st=document.getElementById('statusTag'),sv=f.approvalStatus||'审批通过';if(st){st.textContent=sv;st.className='tag '+(sv==='审批通过'||sv==='已生效'?'tag-green':sv.indexOf('中')>=0?'tag-yellow':'tag-gray')}var t=document.getElementById('attachBody'),x=n.attachments||[],h='';for(var i=0;i<x.length;i++){var o=x[i];h+='<tr><td><input type="checkbox" disabled></td><td><button class="op-icon upload" disabled>📤</button><button class="op-icon delete" disabled>🗑</button><button class="op-icon preview" disabled>👁</button><button class="op-icon download" disabled>📥</button></td><td>'+(o.type||'')+'</td><td><a href="#" onclick="alert(\'👁️ '+o.fileId+'\');return false;" style="color:var(--accent);">'+(o.name||'')+'</a></td><td><a href="#" onclick="alert(\'📥 '+o.fileId+'\');return false;" style="color:var(--success);">'+(o.file||'')+'</a></td><td style="font-family:monospace;font-size:10px;">'+(o.fileId||'')+'</td><td>'+(o.fileType||'')+'</td><td style="text-align:right;">'+(o.size||'')+'</td><td>'+(o.ts||'')+'</td><td>'+(o.user||'')+'</td></tr>'}t.innerHTML=h||'<tr><td colspan="10" class="text-muted" style="text-align:center;padding:16px;">无附件</td></tr>';

// ===== 编辑模式：解锁可编辑字段 =====
if (a.mode === 'edit') {
    try { var locked = JSON.parse(sessionStorage.getItem('editLockedFields') || '{}'); } catch(e) {}
    if (locked) {
        var lockedNames = (locked[m] && locked[m][s]) || [];
        document.querySelectorAll('input,select,textarea').forEach(function(el) {
            var field = el.getAttribute('data-field') || '';
            if (lockedNames.indexOf(field) !== -1) return;
            if (el.tagName === 'SELECT') el.disabled = false;
            else el.readOnly = false;
            el.style.background = '';
            el.style.color = '';
            el.style.cursor = '';
        });
        document.querySelectorAll('.op-icon').forEach(function(el) { el.disabled = false; });
        var chk = document.querySelector('.attach-table thead input[type="checkbox"]');
        if (chk) chk.disabled = false;
    }
}
})();
</script>
</body>
</html>
