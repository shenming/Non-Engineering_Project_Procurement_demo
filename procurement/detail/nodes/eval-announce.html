<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../common/styles.css">
<style>
    .attach-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .attach-table th { text-align: left; padding: 6px 8px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); font-size: 11px; white-space: nowrap; }
    .attach-table td { padding: 6px 8px; border-bottom: 1px solid var(--gray-100); font-size: 11px; }
    .attach-table .op-icon { cursor: pointer; color: var(--primary); font-size: 14px; margin: 0 2px; }
    .attach-table .op-icon.disabled { color: var(--gray-400); cursor: not-allowed; pointer-events: none; }
    .form-control[readonly], .form-control:disabled { background: var(--gray-50); color: var(--gray-600); cursor: not-allowed; }
</style>
</head>
<body class="content-page" style="padding:0;">
<div class="card" style="margin:0;border:none;box-shadow:none;" id="cardRoot">
    <div class="card-header"><h3>📢 评标结果公示</h3></div>
    <div class="card-body">
        <div class="form-group" style="margin-bottom:12px;">
            <label>评标结果公示信息说明</label>
            <textarea class="form-control" id="txtDesc" rows="4" readonly style="background:var(--gray-50);color:var(--gray-600);cursor:not-allowed;"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label>审批状态</label>
            <div><span class="tag tag-yellow">审批中</span></div>
        </div>
        <div class="text-sm fw-600" style="margin-top:20px;border-top:1px solid var(--gray-200);padding-top:16px;margin-bottom:8px;">📎 附件管理</div>
        <div class="table-wrap">
            <table class="attach-table">
                <thead><tr><th style="width:120px;">操作</th><th>附件类型</th><th>附件文档名称</th><th>组件名称</th><th>文件类型</th><th>文件大小（字节）</th><th>时戳编码</th><th>文件上传时间</th><th>上传操作用户名</th></tr></thead>
                <tbody id="attachBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="../../../common/scripts.js"></script>
<script>
(function(){function g(){var p={};location.search.replace('?','').split('&').forEach(function(s){var kv=s.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'')});return p}var a=g(),m=a.method||'公开招标',s=parseInt(a.step)||0,d=JSON.parse(sessionStorage.getItem('procNodeData')||'{}');if(!d||!d[m]||!d[m].nodes||!d[m].nodes[s]){document.getElementById('cardRoot').innerHTML='<div class="card-body"><p class="text-muted">暂无数据</p></div>';return}var n=d[m].nodes[s],f=n.form||{};document.getElementById('txtDesc').value=f.desc||'';document.getElementById('txtStatus').value=f.approvalStatus||'';var t=document.getElementById('attachBody'),x=n.attachments||[],h='';for(var i=0;i<x.length;i++){var o=x[i];h+='<tr><td><span class="op-icon disabled">📤</span><span class="op-icon disabled">🗑</span><span class="op-icon" onclick="alert(\'👁️ 预览\')">👁</span><span class="op-icon" onclick="alert(\'⬇️ 下载\')">⬇</span></td><td>'+(o.type||'')+'</td><td>'+(o.name||'')+'</td><td>'+(o.comp||'')+'</td><td>'+(o.fileType||'')+'</td><td style="text-align:right;">'+(o.size||'')+'</td><td>'+(o.ts||'')+'</td><td>'+(o.time||'')+'</td><td>'+(o.user||'')+'</td></tr>'}t.innerHTML=h||'<tr><td colspan="9" class="text-muted" style="text-align:center;padding:16px;">无附件</td></tr>';})();
</script>
</body>
</html>
