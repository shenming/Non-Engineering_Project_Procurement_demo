<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../common/styles.css">
<style>
    .attach-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .attach-table th { text-align: left; padding: 6px 8px; background: var(--gray-50); font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); font-size: 11px; white-space: nowrap; }
    .attach-table td { padding: 6px 8px; border-bottom: 1px solid var(--gray-100); font-size: 11px; }
    .attach-table .op-icon { cursor: pointer; color: var(--primary); font-size: 14px; margin: 0 2px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .form-control[readonly], .form-control:disabled { background: var(--gray-50); color: var(--gray-600); cursor: not-allowed; }
</style>
</head>
<body class="content-page" style="padding:0;">
<div class="card" style="margin:0;border:none;box-shadow:none;">
    <div class="card-header"><h3>📨 拟邀请单位信息 </h3></div>
    <div class="card-body">
        <div class="form-group" style="margin-bottom:12px;">
            <label>拟邀请单位情况说明 <span class="required">*</span></label>
            <textarea class="form-control" data-field="inviteNote" id="inviteDesc" rows="4" readonly style="background:var(--gray-50);color:var(--gray-600);cursor:not-allowed;"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label>审批状态</label>
            <div><span id="statusTag" class="tag tag-green">审批通过</span></div>
        </div>
        <div class="text-sm fw-600" style="margin-top:20px;border-top:1px solid var(--gray-200);padding-top:16px;margin-bottom:8px;">📎 附件管理</div>
        <div class="table-wrap">
            <table class="attach-table">
                <thead><tr><th style="width:30px;"><input type="checkbox" disabled></th><th style="width:100px;">操作</th><th>附件类型</th><th>附件文档名称</th><th>组件名称</th><th style="width:40px;">预览</th><th>文件类型</th><th>文件大小（字节）</th><th>时戳编码</th><th>文件上传时间</th><th>上传操作用户名</th></tr></thead>
                <tbody id="attachBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="../../../common/scripts.js">
    // ===== 编辑模式：附件管理创建+批量删除 =====
    if (a.mode === 'edit' || (typeof params !== 'undefined' && params.mode === 'edit')) {
        // 添加工具条
        var tb = document.getElementById('attachBody');
        if (tb) {
            var wrap = tb.closest('.table-wrap') || tb.parentNode;
            if (wrap && !wrap.querySelector('.attach-toolbar')) {
                var bar = document.createElement('div');
                bar.className = 'attach-toolbar';
                bar.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;';
                bar.innerHTML = '<button class="btn btn-xs btn-outline" onclick="createAttachRow()">＋ 创建</button>'
                    + '<button class="btn btn-xs btn-danger" onclick="batchDeleteAttach()">🗑 批量删除</button>';
                wrap.parentNode.insertBefore(bar, wrap);
            }
        }
        window.createAttachRow = window.createAttachRow || function() {
            var tb = document.getElementById('attachBody');
            if (!tb) return;
            var tr = document.createElement('tr');
            tr.innerHTML = '<td><input type="checkbox" class="attach-cb"></td>'
                + '<td><span class="op-icon" onclick="if(confirm(\'确认删除？\'))this.closest(\'tr\').remove()">🗑</span></td>'
                + '<td contenteditable="true">新附件</td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true"></td>'
                + '<td contenteditable="true">' + new Date().toISOString().replace('T',' ').substring(0,19) + '</td>'
                + '<td contenteditable="true">当前用户</td>';
            tb.appendChild(tr);
        };
        window.batchDeleteAttach = window.batchDeleteAttach || function() {
            var cbs = document.querySelectorAll('.attach-cb:checked');
            if (cbs.length === 0) { alert('⚠️ 请先勾选要删除的附件行'); return; }
            if (confirm('确认删除选中的 ' + cbs.length + ' 条附件？')) {
                cbs.forEach(function(cb) { var r = cb.closest('tr'); if (r) r.remove(); });
            }
        };
    }
</script>
<script>
(function(){function g(){var p={};location.search.replace('?','').split('&').forEach(function(s){var kv=s.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'')});return p}var a=g(),m=a.method||'公开招标',s=parseInt(a.step)||0,d=JSON.parse(sessionStorage.getItem('procNodeData')||'{}');if(!d||!d[m]||!d[m].nodes||!d[m].nodes[s])return;var n=d[m].nodes[s],f=n.form||{};if(f.inviteNote)document.getElementById('inviteDesc').value=f.inviteNote;
// 动态渲染审批状态
var st=document.getElementById('statusTag'),sv=f.approvalStatus||'审批通过';if(st){st.textContent=sv;st.className='tag '+(sv==='审批通过'||sv==='已生效'?'tag-green':sv.indexOf('中')>=0?'tag-yellow':'tag-gray')}
var t=document.getElementById('attachBody'),x=n.attachments||[],h='';for(var i=0;i<x.length;i++){var o=x[i];h+='<tr><td><input type="checkbox" disabled></td><td><span class="op-icon disabled">📤</span><span class="op-icon disabled">🗑</span><span class="op-icon" onclick="alert(\'⬇️ 下载\')">⬇</span><span class="op-icon" onclick="alert(\'👁️ 预览\')">👁</span></td><td>'+(o.type||'')+'</td><td>'+(o.name||'')+'</td><td>'+(o.comp||'')+'</td><td><span class="op-icon" onclick="alert(\'👁️ 预览\')">👁</span></td><td>'+(o.fileType||'')+'</td><td style="text-align:right;">'+(o.size||'')+'</td><td>'+(o.ts||'')+'</td><td>'+(o.time||'')+'</td><td>'+(o.user||'')+'</td></tr>'}t.innerHTML=h||'<tr><td colspan="11" class="text-muted" style="text-align:center;padding:16px;">无附件</td></tr>';

// ===== 编辑模式：解锁可编辑字段 =====
if (a.mode === 'edit') {
    try { var locked = JSON.parse(sessionStorage.getItem('editLockedFields') || '{}'); } catch(e) {}
    if (locked) {
        var lockedNames = (locked[m] && locked[m][s]) || [];
        document.querySelectorAll('input,select,textarea').forEach(function(el) {
            var field = el.getAttribute('data-field') || '';
            if (lockedNames.indexOf(field) !== -1) return;
            if (el.tagName === 'SELECT') el.disabled = false;
            else el.readOnly = false;
            el.style.background = '';
            el.style.color = '';
            el.style.cursor = '';
        });
        document.querySelectorAll('.op-icon').forEach(function(el) { el.classList.remove('disabled'); });
        var chk = document.querySelector('thead input[type="checkbox"]');
        if (chk) chk.disabled = false;
    }
}
})();
</script>
</body>
</html>
