<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../common/styles.css">
</head>
<body class="content-page">

<div class="sub-navbar">
    <span class="sub-nav-title">📋 调整计划</span>
    <span class="breadcrumb">
        <a onclick="navTo('plans')">采购计划</a><span> › </span>
        2026年度成员企业A采购计划
    </span>
</div>

<div class="alert alert-warning">
    <span>⚠️</span>
    <div>
        <strong>注意：</strong>
        已生效计划的调整需发起升版审批，历史版本永久留存。集团重点管控项禁止删除、拆分、合并。
        当前计划状态：<span class="tag tag-green">已生效</span>
    </div>
</div>

<div class="card">
    <div class="card-header"><h3>计划基本信息</h3></div>
    <div class="card-body">
        <div class="form-group">
            <label>计划名称 <span class="required">*</span></label>
            <input class="form-control" value="2026年度成员企业A采购计划">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>计划类型</label>
                <select class="form-control" disabled>
                    <option value="annual" selected>📅 按年度</option>
                    <option value="event">📌 按事项</option>
                </select>
                <span class="text-xs text-muted">计划类型在创建后不可变更</span>
            </div>
            <div class="form-group">
                <label>计划年度</label>
                <select class="form-control" disabled>
                    <option selected>2026</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>所属单位 <span class="required">*</span></label>
                <select class="form-control">
                    <option selected>成员企业A</option>
                    <option>集团总部</option>
                    <option>成员企业B</option>
                    <option>成员企业C</option>
                </select>
            </div>
            <div class="form-group">
                 <label>计划总预算（元）<span class="required">*</span></label>
                 <input class="form-control" type="number" value="2000000.00">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>计划生效开始 <span class="required">*</span></label>
                <input class="form-control" type="date" value="2026-01-01">
            </div>
            <div class="form-group">
                <label>计划生效结束 <span class="required">*</span></label>
                <input class="form-control" type="date" value="2026-12-31">
            </div>
        </div>
        <div class="form-group">
            <label>计划说明</label>
            <textarea class="form-control" rows="3">涵盖2026年度办公用品、IT设备、法律咨询等货物及服务采购需求。</textarea>
        </div>
        <div class="form-group">
            <label>调整原因 <span class="required">*</span></label>
            <textarea class="form-control" rows="3" placeholder="请说明本次调整的原因和内容">因年度预算调整，需延长计划有效期至2027年3月，并追加预算50万元。</textarea>
        </div>
    </div>
    <div class="card-header" style="border-top:1px solid var(--gray-200);border-bottom:none;background:#fff;">
        <span></span>
        <div class="flex gap-8">
            <button class="btn btn-outline" onclick="navTo('plans','plans/view.html')">取消</button>
            <button class="btn btn-primary" onclick="showAlert('✅ 调整申请已提交升版审批，将在OA中流转。');navTo('plans')">提交审批</button>
        </div>
    </div>
</div>

<script src="../common/scripts.js"></script>
</body>
</html>
