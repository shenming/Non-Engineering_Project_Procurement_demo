<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../common/styles.css">
</head>
<body class="content-page">

<div class="sub-navbar">
    <span class="sub-nav-title">📋 新建采购计划</span>
    <span class="breadcrumb"><a onclick="navTo('plans')">采购计划</a><span> › </span>新建</span>
</div>

<div class="card">
    <div class="card-header"><h3>计划基本信息</h3></div>
    <div class="card-body">

        <!-- 计划名称 & 类型（按年度/按事项）-->
        <div class="form-group">
            <label>计划名称 <span class="required">*</span></label>
            <input class="form-control" value="2026年度成员企业A采购计划" placeholder="例：2026年度成员企业A采购计划 / 某展会专项采购计划">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>计划类型 <span class="required">*</span></label>
                <select class="form-control" id="planType" onchange="togglePlanType()">
                    <option value="annual" selected>📅 按年度</option>
                    <option value="event">📌 按事项</option>
                </select>
            </div>
            <div class="form-group" id="yearGroup">
                <label>计划年度 <span class="required">*</span></label>
                <select class="form-control">
                    <option>2025</option>
                    <option selected>2026</option>
                    <option>2027</option>
                </select>
            </div>
            <div class="form-group" id="eventNameGroup" style="display:none;">
                <label>事项名称 <span class="required">*</span></label>
                <input class="form-control" placeholder="例：进博会专项采购">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>所属单位 <span class="required">*</span></label>
                <select class="form-control">
                    <option>集团总部</option>
                    <option selected>成员企业A</option>
                    <option>成员企业B</option>
                    <option>成员企业C</option>
                </select>
            </div>
            <div class="form-group">
                <label>计划总预算（万元）<span class="required">*</span></label>
                <input class="form-control" type="number" value="200.0" placeholder="计划项合计不得超过此预算">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>计划生效开始 <span class="required">*</span></label>
                <input class="form-control" type="date" value="2026-01-01">
            </div>
            <div class="form-group">
                <label>计划生效结束 <span class="required">*</span></label>
                <input class="form-control" type="date" value="2026-12-31">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>编制部门 <span class="required">*</span></label>
                <input class="form-control" value="采购部">
            </div>
            <div class="form-group">
                <label>编制人 <span class="required">*</span></label>
                <input class="form-control" value="张明">
            </div>
        </div>

        <div class="form-group">
            <label>计划说明</label>
            <textarea class="form-control" rows="3" placeholder="对该采购计划的整体说明、编制依据等">涵盖2026年度办公用品、IT设备、法律咨询等货物及服务采购需求。</textarea>
        </div>

        <div class="form-group">
            <label>附件（预算批复/需求说明等）</label>
            <input class="form-control" type="file" multiple>
            <span class="text-xs text-muted">支持上传预算批复文件、年度采购需求汇总等佐证材料</span>
        </div>

    </div>
    <div class="card-header" style="border-top:1px solid var(--gray-200);border-bottom:none;background:#fff;">
        <span></span>
        <div class="flex gap-8">
            <button class="btn btn-outline" onclick="navTo('plans')">取消</button>
            <button class="btn btn-primary" onclick="onSubmitPlan()">保存并进入招采项维护</button>
        </div>
    </div>
</div>

<script>
function togglePlanType() {
    var type = document.getElementById('planType').value;
    document.getElementById('yearGroup').style.display = type === 'annual' ? '' : 'none';
    document.getElementById('eventNameGroup').style.display = type === 'event' ? '' : 'none';
}

function onSubmitPlan() {
    showAlert('✅ 计划已创建，请进入下一步维护招采项明细。');
    // 模拟跳转到 view 页面（带计划ID参数）
    window.parent.postMessage({ type: 'navigate', module: 'plans', file: 'plans/view.html' }, '*');
}
</script>

<script src="../common/scripts.js"></script>
</body>
</html>
