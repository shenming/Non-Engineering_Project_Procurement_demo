<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../common/styles.css">
</head>
<body class="content-page">

<div class="sub-navbar">
    <span class="sub-nav-title">➕ 新增招采项</span>
    <span class="breadcrumb"><a onclick="navTo('plans')">采购计划</a><span> › </span><a onclick="navTo('plans','plans/view.html')">2026年度成员企业A采购计划</a><span> › </span>新增招采项</span>
</div>

<div class="card">
    <div class="card-header"><h3>招采项信息</h3></div>
    <div class="card-body">
        <div class="alert alert-info"><span>📌</span><div>归属计划：<strong>2026年度成员企业A采购计划</strong>（PL-2026-0001）</div></div>

        <div class="form-group"><label>采购内容 <span class="required">*</span></label><input class="form-control" id="itemName" placeholder="请填写采购内容描述"></div>
        <div class="form-row">
            <div class="form-group"><label>采购类别 <span class="required">*</span></label><select class="form-control" id="itemCatParent" onchange="populateSubCategory('itemCatParent','itemCatSub')"><option value="">— 请选择 —</option><option value="货物类">货物类</option><option value="服务类" selected>服务类</option></select></div>
            <div class="form-group"><label>二级品类</label><select class="form-control" id="itemCatSub"><option value="">— 请先选择一级类别 —</option></select></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>预选采购方式 <span class="required">*</span></label><select class="form-control" id="itemMethod" onchange="onMethodChange()"><option>公开招标</option><option>邀请招标</option><option selected>询比采购</option><option>谈判采购</option><option>直接采购</option></select></div>
            <div class="form-group" id="itemNoteGroup" style="display:none;"><label>采购项说明 <span class="required">*</span></label><select class="form-control" id="itemNote"><option value="">—</option></select></div>
        </div>
        <div class="form-row"><div class="form-group"><label>采购金额含税（元）<span class="required">*</span></label><input class="form-control" type="number" id="itemCeiling" value="100000.00" step="0.01"></div></div>
        <div class="method-hints" id="itemMethodHints" style="display:none;"></div>

        <div class="form-row"><div class="form-group"><label>计划开始 <span class="required">*</span></label><input class="form-control" type="date"></div><div class="form-group"><label>计划结束 <span class="required">*</span></label><input class="form-control" type="date"></div></div>
        <div class="form-row"><div class="form-group"><label>需求部门 <span class="required">*</span></label><input class="form-control" value="采购部"></div><div class="form-group"><label>经办人 <span class="required">*</span></label><input class="form-control" value="张明"></div></div>
    </div>
    <div class="card-header" style="border-top:1px solid var(--gray-200);border-bottom:none;background:#fff;"><span></span><div class="flex gap-8"><button class="btn btn-outline" onclick="navTo('plans','plans/view.html')">取消</button><button class="btn btn-primary" onclick="saveItem()">保存</button></div></div>
</div>

<script src="../common/scripts.js"></script>
<script>
populateSubCategory('itemCatParent', 'itemCatSub');
bindMethodRecommendation('itemCatParent', 'itemCeiling', 'itemMethod', null, 'itemMethodHints');

function onMethodChange() {
    var m = document.getElementById('itemMethod').value;
    var noteGroup = document.getElementById('itemNoteGroup'), noteSel = document.getElementById('itemNote');
    if (m === '谈判采购' || m === '直接采购') { noteGroup.style.display=''; noteSel.innerHTML=noteOptionsHTML(m); } else { noteGroup.style.display='none'; noteSel.innerHTML='<option value="">—</option>'; }
    if (m === '谈判采购') { window.parent.postMessage({ type: 'modal', title: '📋 谈判采购 · 请选择适用情形', body: getNegotiationConditionsHTML(), onConfirm: 'negoSelected' }, '*'); }
    else if (m === '直接采购') { window.parent.postMessage({ type: 'modal', title: '📌 直接采购 · 请选择适用情形', body: getDirectPurchaseConditionsHTML(parseFloat(document.getElementById('itemCeiling').value)||0), onConfirm: 'dpSelected' }, '*'); }
}
window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'modalConfirm' && e.data.payload) {
        if (e.data.payload === 'negoSelected') { var checked = window.parent.document.querySelector('input[name="negoCond"]:checked'); if (checked) { var label = ''; if (checked.value === 'N1') label = '技术复杂/性质特殊'; else if (checked.value === 'N2') label = '多种实施方案'; else if (checked.value === 'N3') label = '仅2家合格供应商'; showAlert('✅ 已选择谈判采购情形：' + label); } }
        else if (e.data.payload === 'dpSelected') { var checked = window.parent.document.querySelector('input[name="dpCond"]:checked'); if (checked) { var dpMap = { 'D1': '合同估算价＜100,000.00元', 'D2': '涉密/商业秘密', 'D3': '不可替代专利/专有技术', 'D4': '原供应商配套', 'D5': '仅1家有效供应商', 'D6': '抢险救灾/紧急采购', 'D7': '政策文件规定' }; showAlert('✅ 已选择直接采购情形：' + (dpMap[checked.value] || checked.value)); } }
    }
});

function saveItem() {
    var cat = document.getElementById('itemCatParent').value, method = document.getElementById('itemMethod').value;
    var amt = parseFloat(document.getElementById('itemCeiling').value) || 0;
    // fix: validateItemMethod(category, amount, method)
    var vld = validateItemMethod(cat, amt, method);
    if (!vld.valid) { showAlert('⚠️ ' + vld.reason); return; }
    var note = document.getElementById('itemNote').value;
    var nv = validateItemNote(method, note, amt);
    if (!nv.valid) { showAlert('⚠️ ' + nv.reason); return; }
    showAlert('✅ 招采项已保存。');
    navTo('plans','plans/view.html');
}
</script>
</body>
</html>
